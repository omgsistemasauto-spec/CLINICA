<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMG - Agenda</title>
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjT2ibAVIOrznPV6BL68qpd9TZAxx_lotverPdHDCvquOJPoXLKo8VGjrILVoCSzFqRPt_BqCn9AhPaUC11KcgiEMZF1PEcvJbS4dhMoltNNbHTzk9Ous4W9N4xyMi6rabKepBFI1blV3M1pAp4pw1RB8NqgjPv9fpZcxJWS-mXYSfpgR4HdImnBidjoOU/s16000/Generated%20Image%20November%2008,%202025%20-%204_27PM.png'); background-size: cover; background-position: center; filter: blur(8px) brightness(0.7); z-index: -1; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .loading-overlay.show { opacity: 1; visibility: visible; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(59, 130, 246, 0.2); border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #1f2937; font-size: 1rem; font-weight: 600; }
        .login-card { background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 24px; padding: 3rem 2.5rem; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.18); }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-logo { font-size: 2.1rem; font-weight: 900; color: #ffffff; margin-bottom: 0.3rem; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2); }
        .login-subtitle { font-size: 1rem; color: rgba(255, 255, 255, 0.95); font-weight: 500; letter-spacing: 1px; }
        .login-title { font-size: 0.9rem; color: rgba(255, 255, 255, 0.95); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin: 1.5rem 0 1.2rem 0; }
        .form-container { display: none; }
        .form-container.active { display: block; }
        .error-message, .success-message { padding: 0.75rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.85rem; font-weight: 500; text-align: center; }
        .error-message { background: rgba(239, 68, 68, 0.9); color: #ffffff; }
        .success-message { background: rgba(34, 197, 94, 0.9); color: #ffffff; }
        .form-input { width: 100%; padding: 0.9rem 1rem; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; font-size: 0.9rem; font-family: 'Inter', sans-serif; color: #ffffff; margin-bottom: 1rem; transition: all 0.2s ease; }
        .form-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .form-input:focus { outline: none; background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.5); }
        .input-wrapper { position: relative; margin-bottom: 1rem; }
        .input-wrapper .form-input { margin-bottom: 0; padding-right: 3rem; }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255, 255, 255, 0.7); cursor: pointer; font-size: 1rem; padding: 0.5rem; transition: color 0.2s ease; }
        .password-toggle:hover { color: rgba(255, 255, 255, 1); }
        .btn-primary { width: 100%; padding: 0.95rem; background: rgba(30, 64, 175, 0.95); backdrop-filter: blur(10px); color: #ffffff; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.5rem; }
        .btn-primary:hover { background: rgba(30, 64, 175, 1); transform: translateY(-2px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .forgot-password { text-align: center; margin-top: 1.2rem; }
        .forgot-password a { color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.2s ease; }
        .forgot-password a:hover { color: #ffffff; text-decoration: underline; }
        .signup-link { text-align: center; margin-top: 1.5rem; color: rgba(255, 255, 255, 0.9); font-size: 0.9rem; }
        .signup-link a { color: #ffffff; font-weight: 700; text-decoration: none; transition: opacity 0.2s ease; }
        .signup-link a:hover { opacity: 0.8; text-decoration: underline; }
        .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem; }
        .plan-option { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 1rem; cursor: pointer; transition: all 0.2s ease; text-align: center; }
        .plan-option:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255, 255, 255, 0.5); }
        .plan-option.selected { background: rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.8); }
        .plan-name { font-size: 0.75rem; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
        .plan-price { font-size: 1.3rem; font-weight: 800; color: #ffffff; margin-bottom: 0.2rem; }
        .plan-description { font-size: 0.7rem; color: rgba(255, 255, 255, 0.8); }
        .form-label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; font-weight: 600; color: rgba(255, 255, 255, 0.9); text-transform: uppercase; letter-spacing: 0.5px; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 12px; color: #ffffff; font-weight: 600; font-size: 0.9rem; z-index: 10001; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); animation: slideIn 0.3s ease; backdrop-filter: blur(10px); }
        .notification.success { background: rgba(34, 197, 94, 0.95); }
        .notification.error { background: rgba(239, 68, 68, 0.95); }
        .notification.info { background: rgba(59, 130, 246, 0.95); }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(400px); opacity: 0; } }
        @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem; margin: 1rem; } .login-logo { font-size: 2rem; } .plan-grid { grid-template-columns: 1fr; } }
        .form-container { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Processando...</div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">OMG AGENDA</div>
            <div class="login-subtitle">Gestão inteligente</div>
        </div>

        <div id="loginForm" class="form-container active">
            <div class="login-title">LOGIN</div>
            <div id="loginError" style="display: none;"></div>
            <form id="loginFormElement">
                <input type="email" class="form-input" id="loginEmail" placeholder="Usuário" required>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="loginPassword" placeholder="Senha" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="forgot-password"><a href="#" onclick="alert('Funcionalidade em breve')">Esqueceu a senha?</a></div>
            <div class="signup-link">Não tem conta? <a href="#" onclick="switchForm('register')">Cadastre-se</a></div>
        </div>

        <div id="registerForm" class="form-container">
            <div class="login-title">CADASTRO</div>
            <div id="registerError" style="display: none;"></div>
            <div id="registerSuccess" style="display: none;"></div>
            <form id="registerFormElement">
                <input type="text" class="form-input" id="registerName" placeholder="Nome Completo" required>
                <input type="email" class="form-input" id="registerEmail" placeholder="E-mail" required>
                <input type="tel" class="form-input" id="registerPhone" placeholder="Telefone" required>
                <input type="text" class="form-input" id="registerSaloonName" placeholder="Nome do Salão" required>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="registerPassword" placeholder="Senha (min. 12 caracteres)" required minlength="12" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')"><i class="fas fa-eye"></i></button>
                </div>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="registerPasswordConfirm" placeholder="Confirmar Senha" required autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPasswordConfirm')"><i class="fas fa-eye"></i></button>
                </div>
                <label class="form-label">Escolha seu Plano</label>
                <div class="plan-grid">
                    <div class="plan-option selected" data-plan="free" onclick="selectPlan('free')">
                        <div class="plan-name">Gratuito</div>
                        <div class="plan-price">R$ 0</div>
                        <div class="plan-description">7 dias grátis</div>
                    </div>
                    <div class="plan-option" data-plan="premium" onclick="selectPlan('premium')">
                        <div class="plan-name">Premium</div>
                        <div class="plan-price">R$ 170</div>
                        <div class="plan-description">Por mês</div>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
            </form>
            <div class="signup-link">Já tem conta? <a href="#" onclick="switchForm('login')">Faça login</a></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            var API = 'https://rdfcosxyeqgbjdedargd.supabase.co/functions/v1';
            var selectedPlan = 'free';

            function show(id, msg, type) {
                var el = document.getElementById(id);
                el.innerHTML = '<div class="' + type + '-message"><i class="fas fa-' + (type === 'error' ? 'exclamation' : 'check') + '-circle"></i> ' + msg + '</div>';
                el.style.display = 'block';
            }
            function hide(id) { var el = document.getElementById(id); el.style.display = 'none'; el.innerHTML = ''; }
            function loading(msg) { document.getElementById('loadingText').textContent = msg; document.getElementById('loadingOverlay').classList.add('show'); }
            function stopLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
            function notify(msg, type) {
                var n = document.createElement('div');
                n.className = 'notification ' + type;
                n.innerHTML = '<i class="fas fa-' + (type === 'success' ? 'check' : 'times') + '-circle"></i> ' + msg;
                document.body.appendChild(n);
                setTimeout(function() { n.style.animation = 'slideOut 0.3s ease forwards'; setTimeout(function() { n.remove(); }, 300); }, 4000);
            }

            document.getElementById('registerPhone').addEventListener('input', function(e) {
                var v = e.target.value.replace(/\D/g, '');
                if (v.length >= 11) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                else if (v.length >= 7) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
                else if (v.length >= 3) v = v.replace(/(\d{2})(\d{0,5})/, '($1) $2');
                e.target.value = v;
            });

            document.getElementById('loginFormElement').addEventListener('submit', async function(e) {
                e.preventDefault();
                var email = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;
                if (!email || !password) { show('loginError', 'Preencha todos os campos', 'error'); return; }
                loading('Entrando...'); hide('loginError');
                try {
                    var res = await fetch(API + '/auth-login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password }) });
                    var data = await res.json();
                    if (data.error) { show('loginError', data.error, 'error'); document.getElementById('loginPassword').value = ''; }
                    else if (data.success) {
                        if (data.session) { localStorage.setItem('omg_access_token', data.session.access_token); localStorage.setItem('omg_refresh_token', data.session.refresh_token); }
                        notify('Login realizado!', 'success');
                        setTimeout(function() { window.location.href = 'index1.html'; }, 1000);
                    }
                } catch (err) { show('loginError', 'Erro de conexão. Tente novamente.', 'error'); }
                stopLoading();
            });

            document.getElementById('registerFormElement').addEventListener('submit', async function(e) {
                e.preventDefault();
                var formData = {
                    name: document.getElementById('registerName').value.trim(),
                    email: document.getElementById('registerEmail').value.trim(),
                    phone: document.getElementById('registerPhone').value.trim(),
                    saloonName: document.getElementById('registerSaloonName').value.trim(),
                    password: document.getElementById('registerPassword').value,
                    passwordConfirm: document.getElementById('registerPasswordConfirm').value,
                    plan: selectedPlan
                };
                loading('Criando conta...'); hide('registerError');
                try {
                    var res = await fetch(API + '/auth-register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                    var data = await res.json();
                    if (data.error) { show('registerError', data.error, 'error'); document.getElementById('registerPassword').value = ''; document.getElementById('registerPasswordConfirm').value = ''; }
                    else if (data.success) {
                        if (data.session) { localStorage.setItem('omg_access_token', data.session.access_token); localStorage.setItem('omg_refresh_token', data.session.refresh_token); }
                        show('registerSuccess', 'Conta criada! Redirecionando...', 'success');
                        setTimeout(function() { window.location.href = 'index1.html'; }, 2000);
                    }
                } catch (err) { show('registerError', 'Erro de conexão. Tente novamente.', 'error'); }
                stopLoading();
            });

            (async function() {
                var token = localStorage.getItem('omg_access_token');
                if (token) {
                    try {
                        var res = await fetch(API + '/auth-check', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } });
                        var data = await res.json();
                        if (data.authenticated) window.location.href = 'index1.html';
                    } catch (err) {}
                }
            })();

            window.switchForm = function(f) {
                document.getElementById('loginForm').classList.toggle('active', f === 'login');
                document.getElementById('registerForm').classList.toggle('active', f === 'register');
                hide('loginError'); hide('registerError');
            };
            window.selectPlan = function(p) {
                document.querySelectorAll('.plan-option').forEach(function(el) { el.classList.remove('selected'); });
                document.querySelector('[data-plan="' + p + '"]').classList.add('selected');
                selectedPlan = p;
            };
            window.togglePassword = function(id) {
                var input = document.getElementById(id);
                var icon = input.nextElementSibling.querySelector('i');
                if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
                else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
            };
        })();
    </script>
</body>
</html>
