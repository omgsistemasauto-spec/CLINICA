<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMG - Agenda</title>
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg-main: #f7f5fb;
    --bg-card: #ffffff;
    --bg-input: #f1ecfa;

    --purple-dark: #3b1d5f;
    --purple: #6d3fb2;

    --border: #e3dbf3;
    --text-main: #3b1d5f;
    --text-muted: #8f7bb5;

    --success: #22c55e;
    --error: #ef4444;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background:
        radial-gradient(circle at 20% 20%, rgba(109,63,178,.12), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(59,29,95,.12), transparent 40%),
        var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
}

/* LOADING */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(247,245,251,.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: .3s;
}
.loading-overlay.show {
    opacity: 1;
    visibility: visible;
}
.loading-spinner {
    width: 46px;
    height: 46px;
    border: 3px solid rgba(109,63,178,.25);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin .8s linear infinite;
}
.loading-text {
    margin-top: 1rem;
    font-weight: 600;
    color: var(--purple-dark);
}
@keyframes spin {
    to { transform: rotate(360deg); }
}

/* CARD */
.login-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-card);
    border-radius: 22px;
    padding: 2.8rem 2.4rem;
    box-shadow: 0 30px 70px rgba(59,29,95,.15);
    border: 1px solid var(--border);
}

/* HEADER */
.login-header {
    text-align: center;
    margin-bottom: 2rem;
}
.login-logo {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--purple-dark);
}
.login-subtitle {
    margin-top: .3rem;
    font-size: .9rem;
    color: var(--text-muted);
}

/* TITLES */
.login-title {
    font-size: .75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 800;
    color: var(--purple);
    margin-bottom: 1rem;
}

/* FORMS */
.form-container {
    display: none;
}
.form-container.active {
    display: block;
}

/* INPUTS */
.form-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
    font-size: .9rem;
    color: var(--text-main);
    transition: .25s;
    margin-bottom: 1rem;
}
.form-input::placeholder {
    color: #a090c7;
}
.form-input:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(109,63,178,.18);
    background: #ffffff;
}

/* PASSWORD */
.input-wrapper {
    position: relative;
}
.password-toggle {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--purple);
    cursor: pointer;
}
.password-toggle:hover {
    color: var(--purple-dark);
}

/* BUTTON */
.btn-primary {
    width: 100%;
    padding: 1rem;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--purple-dark), var(--purple));
    color: white;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .8px;
    transition: .25s;
    box-shadow: 0 12px 30px rgba(59,29,95,.35);
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 40px rgba(59,29,95,.45);
}

/* LINKS */
.forgot-password,
.signup-link {
    text-align: center;
    margin-top: 1.2rem;
    font-size: .85rem;
    color: var(--text-muted);
}
.forgot-password a,
.signup-link a {
    color: var(--purple);
    font-weight: 700;
    text-decoration: none;
}
.forgot-password a:hover,
.signup-link a:hover {
    text-decoration: underline;
}

/* PLANS */
.plan-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .8rem;
    margin-bottom: 1rem;
}
.plan-option {
    background: var(--bg-input);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    transition: .25s;
}
.plan-option:hover {
    border-color: var(--purple);
}
.plan-option.selected {
    border-color: var(--purple);
    background: rgba(109,63,178,.12);
}
.plan-name {
    font-size: .7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--purple-dark);
    font-weight: 800;
}
.plan-price {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--purple);
}
.plan-description {
    font-size: .75rem;
    color: var(--text-muted);
}

/* ALERTS */
.error-message {
    background: rgba(239,68,68,.12);
    color: var(--error);
    padding: .8rem;
    border-radius: 12px;
    margin-bottom: 1rem;
    text-align: center;
}
.success-message {
    background: rgba(34,197,94,.12);
    color: var(--success);
    padding: .8rem;
    border-radius: 12px;
    margin-bottom: 1rem;
}
.login-logo {
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-logo img {
    width: 380px;
    max-width: 100%;
    height: auto;
    margin-bottom: .5rem;
}

/* NOTIFICATION */
.notification {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 1rem 1.4rem;
    border-radius: 14px;
    font-weight: 700;
    color: white;
    z-index: 9999;
    animation: slideIn .3s ease;
}
.notification.success {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
}
.notification.error {
    background: #ef4444;
}
@keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* MOBILE */
@media (max-width: 480px) {
    .login-card {
        margin: 1rem;
        padding: 2rem 1.5rem;
    }
    .plan-grid {
        grid-template-columns: 1fr;
    }
}
</style>

</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Processando...</div>
    </div>
    

    <div class="login-card">
<div class="login-logo">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh89nKgpu6u6Z5uZwD2rTDKgsnYezle7ZclkNlfwdJ_v-2fTuiVcu6jVQldUI1N3qdqOH74MbQBcuqclj2qVQGbv9qp1t0ObX_EMswPBLWlYNEm64rLFxo2_FOlzbsLUGMCziunBt_3zUq-dys-Wj1iuRyS5bDfUom6RG_WawNMCx9QHs3MV-tJvAugcP2e/s16000/vecxo_transparent%20(2).png" alt="Vecxo">
</div>


        <div id="loginForm" class="form-container active">
            <div class="login-title">LOGIN</div>
            <div id="loginError" style="display: none;"></div>
            <form id="loginFormElement">
                <input type="email" class="form-input" id="loginEmail" placeholder="Usuário" required>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="loginPassword" placeholder="Senha" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <div class="forgot-password"><a href="#" onclick="alert('Funcionalidade em breve')">Esqueceu a senha?</a></div>
            <div class="signup-link">Não tem conta? <a href="#" onclick="switchForm('register')">Cadastre-se</a></div>
        </div>

        <div id="registerForm" class="form-container">
            <div class="login-title">CADASTRO</div>
            <div id="registerError" style="display: none;"></div>
            <div id="registerSuccess" style="display: none;"></div>
            <form id="registerFormElement">
                <input type="text" class="form-input" id="registerName" placeholder="Nome Completo" required>
                <input type="email" class="form-input" id="registerEmail" placeholder="E-mail" required>
                <input type="tel" class="form-input" id="registerPhone" placeholder="Telefone" required>
                <input type="text" class="form-input" id="registerSaloonName" placeholder="Nome do Salão" required>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="registerPassword" placeholder="Senha (min. 12 caracteres)" required minlength="12" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')"><i class="fas fa-eye"></i></button>
                </div>
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="registerPasswordConfirm" placeholder="Confirmar Senha" required autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPasswordConfirm')"><i class="fas fa-eye"></i></button>
                </div>
                <label class="form-label">Escolha seu Plano</label>
                <div class="plan-grid">
                    <div class="plan-option selected" data-plan="free" onclick="selectPlan('free')">
                        <div class="plan-name">Gratuito</div>
                        <div class="plan-price">R$ 0</div>
                        <div class="plan-description">7 dias grátis</div>
                    </div>
                    <div class="plan-option" data-plan="premium" onclick="selectPlan('premium')">
                        <div class="plan-name">Premium</div>
                        <div class="plan-price">R$ 170</div>
                        <div class="plan-description">Por mês</div>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
            </form>
            <div class="signup-link">Já tem conta? <a href="#" onclick="switchForm('login')">Faça login</a></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            var API = 'https://rdfcosxyeqgbjdedargd.supabase.co/functions/v1';
            var selectedPlan = 'free';

            function show(id, msg, type) {
                var el = document.getElementById(id);
                el.innerHTML = '<div class="' + type + '-message"><i class="fas fa-' + (type === 'error' ? 'exclamation' : 'check') + '-circle"></i> ' + msg + '</div>';
                el.style.display = 'block';
            }
            function hide(id) { var el = document.getElementById(id); el.style.display = 'none'; el.innerHTML = ''; }
            function loading(msg) { document.getElementById('loadingText').textContent = msg; document.getElementById('loadingOverlay').classList.add('show'); }
            function stopLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
            function notify(msg, type) {
                var n = document.createElement('div');
                n.className = 'notification ' + type;
                n.innerHTML = '<i class="fas fa-' + (type === 'success' ? 'check' : 'times') + '-circle"></i> ' + msg;
                document.body.appendChild(n);
                setTimeout(function() { n.style.animation = 'slideOut 0.3s ease forwards'; setTimeout(function() { n.remove(); }, 300); }, 4000);
            }

            document.getElementById('registerPhone').addEventListener('input', function(e) {
                var v = e.target.value.replace(/\D/g, '');
                if (v.length >= 11) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                else if (v.length >= 7) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
                else if (v.length >= 3) v = v.replace(/(\d{2})(\d{0,5})/, '($1) $2');
                e.target.value = v;
            });

            document.getElementById('loginFormElement').addEventListener('submit', async function(e) {
                e.preventDefault();
                var email = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;
                if (!email || !password) { show('loginError', 'Preencha todos os campos', 'error'); return; }
                loading('Entrando...'); hide('loginError');
                try {
                    var res = await fetch(API + '/auth-login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: password }) });
                    var data = await res.json();
                    if (data.error) { show('loginError', data.error, 'error'); document.getElementById('loginPassword').value = ''; }
                    else if (data.success) {
                        if (data.session) { localStorage.setItem('omg_access_token', data.session.access_token); localStorage.setItem('omg_refresh_token', data.session.refresh_token); }
                        notify('Login realizado!', 'success');
                        setTimeout(function() { window.location.href = 'index.html'; }, 1000);
                    }
                } catch (err) { show('loginError', 'Erro de conexão. Tente novamente.', 'error'); }
                stopLoading();
            });

            document.getElementById('registerFormElement').addEventListener('submit', async function(e) {
                e.preventDefault();
                var formData = {
                    name: document.getElementById('registerName').value.trim(),
                    email: document.getElementById('registerEmail').value.trim(),
                    phone: document.getElementById('registerPhone').value.trim(),
                    saloonName: document.getElementById('registerSaloonName').value.trim(),
                    password: document.getElementById('registerPassword').value,
                    passwordConfirm: document.getElementById('registerPasswordConfirm').value,
                    plan: selectedPlan
                };
                loading('Criando conta...'); hide('registerError');
                try {
                    var res = await fetch(API + '/auth-register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                    var data = await res.json();
                    if (data.error) { show('registerError', data.error, 'error'); document.getElementById('registerPassword').value = ''; document.getElementById('registerPasswordConfirm').value = ''; }
                    else if (data.success) {
                        if (data.session) { localStorage.setItem('omg_access_token', data.session.access_token); localStorage.setItem('omg_refresh_token', data.session.refresh_token); }
                        show('registerSuccess', 'Conta criada! Redirecionando...', 'success');
                        setTimeout(function() { window.location.href = 'index.html'; }, 2000);
                    }
                } catch (err) { show('registerError', 'Erro de conexão. Tente novamente.', 'error'); }
                stopLoading();
            });

            (async function() {
                var token = localStorage.getItem('omg_access_token');
                if (token) {
                    try {
                        var res = await fetch(API + '/auth-check', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } });
                        var data = await res.json();
                        if (data.authenticated) window.location.href = 'index.html';
                    } catch (err) {}
                }
            })();

            window.switchForm = function(f) {
                document.getElementById('loginForm').classList.toggle('active', f === 'login');
                document.getElementById('registerForm').classList.toggle('active', f === 'register');
                hide('loginError'); hide('registerError');
            };
            window.selectPlan = function(p) {
                document.querySelectorAll('.plan-option').forEach(function(el) { el.classList.remove('selected'); });
                document.querySelector('[data-plan="' + p + '"]').classList.add('selected');
                selectedPlan = p;
            };
            window.togglePassword = function(id) {
                var input = document.getElementById(id);
                var icon = input.nextElementSibling.querySelector('i');
                if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
                else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
            };
        })();
    </script>
</body>
</html>
