.lo{position:fixed;inset:0;background:rgba(37,99,235,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;color:#fff}

<script>
var SU='https://rdfcosxyeqgbjdedargd.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkZmNvc3h5ZXFnYmpkZWRhcmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MDkxNTQsImV4cCI6MjA3NzA4NTE1NH0.wNx6jQAi9nn2K_E-40VuV6k0sWPoF5bWAw_si__aSyo';
var db=window.supabase.createClient(SU,SK);
var user,sid,trans=[],pags=[],mens=[],sess=[],profs=[],srvs=[],curTab='caixa';
function $(i){return document.getElementById(i)}
function sL(t){$('lt').textContent=t||'Carregando...';$('lo').style.display='flex'}
function hL(){$('lo').style.display='none'}
function sT(m,t){var e=$('toast');e.className='toast '+(t||'ok')+' show';e.innerHTML='<i class="fas fa-'+(t==='err'?'times':'check')+'-circle"></i> '+m;setTimeout(function(){e.classList.remove('show')},3e3)}
function fm(v){return'R$ '+(Number(v)||0).toFixed(2).replace('.',',')}
function fd(d){if(!d)return'-';return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}
function ff(f){return{pix:'PIX',cartao_credito:'Cartao Credito',cartao_debito:'Cartao Debito',dinheiro:'Dinheiro',boleto:'Boleto',transferencia:'Transferencia'}[f]||f||'-'}
function oM(h){$('mc2').innerHTML=h;$('mo').classList.add('show')}
function cM(){$('mo').classList.remove('show')}
function sTab(t){curTab=t;rTabs();rTab()}
function gP(){return $('per').value}
function hoje(){return new Date().toISOString().split('T')[0]}

async function init(){
try{sL('Verificando...');
var s=await db.auth.getSession();if(!s.data.session){window.location.href='login.html';return}
user=s.data.session.user;
var r=await db.from('saloes').select('*').eq('usuario_id',user.id).eq('ativo',true).single();
if(!r.data){alert('Nenhum estabelecimento');window.location.href='login.html';return}
sid=r.data.id;// Logo fixo VECXO
var nm=user.user_metadata&&user.user_metadata.nome?user.user_metadata.nome:'Admin';
$('uname').textContent=nm;$('uav').textContent=nm.charAt(0).toUpperCase();
var h=new Date();$('per').value=h.getFullYear()+'-'+String(h.getMonth()+1).padStart(2,'0');
await loadAll();hL();
}catch(e){console.error(e);hL();sT('Erro','err')}
}

async function loadAll(){
sL('Carregando...');var p=gP(),ini=p+'-01';
var d=new Date(p+'-01T00:00:00');d.setMonth(d.getMonth()+1);var fim=d.toISOString().split('T')[0];
try{var r=await Promise.all([
db.from('transacoes_financeiras').select('*').eq('salao_id',sid).gte('data',ini).lt('data',fim).order('data',{ascending:false}),
db.from('pagamentos_mensalidade').select('*,mensalidades(*,clientes(id,nome,telefone),planos(id,nome,valor))').eq('salao_id',sid).gte('data_pagamento',ini).lt('data_pagamento',fim).order('data_pagamento',{ascending:false}),
db.from('mensalidades').select('*,clientes(id,nome),planos(id,nome,valor)').eq('salao_id',sid),
db.from('sessoes').select('*,clientes(id,nome),servicos(id,nome,preco),profissionais(id,nome)').eq('salao_id',sid).gte('data_sessao',ini).lt('data_sessao',fim).order('data_sessao',{ascending:false}),
db.from('profissionais').select('id,nome').eq('salao_id',sid).eq('ativo',true),
db.from('servicos').select('id,nome,preco,comissao').eq('salao_id',sid).eq('ativo',true)
]);
trans=r[0].data||[];pags=r[1].data||[];mens=r[2].data||[];sess=r[3].data||[];profs=r[4].data||[];srvs=r[5].data||[];
rStats();rTabs();rTab();
}catch(e){console.error(e);sT('Erro','err')}hL();
}

function cRec(){var rm=pags.reduce(function(s,p){return s+(p.valor_pago||0)},0);var ro=trans.filter(function(t){return t.tipo==='entrada'}).reduce(function(s,t){return s+(t.valor||0)},0);return{mens:rm,outras:ro,total:rm+ro}}
function cDesp(){return trans.filter(function(t){return t.tipo==='saida'}).reduce(function(s,t){return s+(t.valor||0)},0)}
function cCaixaHoje(){
var hj=hoje();
var entH=pags.filter(function(p){return p.data_pagamento===hj}).reduce(function(s,p){return s+(p.valor_pago||0)},0);
entH+=trans.filter(function(t){return t.tipo==='entrada'&&t.data===hj}).reduce(function(s,t){return s+(t.valor||0)},0);
var saiH=trans.filter(function(t){return t.tipo==='saida'&&t.data===hj}).reduce(function(s,t){return s+(t.valor||0)},0);
return{ent:entH,sai:saiH,saldo:entH-saiH};
}

function rStats(){
var rec=cRec(),dsp=cDesp(),luc=rec.total-dsp,cx=cCaixaHoje();
var inad=0;var hj2=new Date();hj2.setHours(0,0,0,0);
mens.forEach(function(m){if(m.status!=='pago'&&m.status!=='cancelado'){var v=new Date(m.data_vencimento+'T00:00:00');if(v<hj2)inad+=m.valor||0}});
$('stats').innerHTML=
'<div class="sc o"><div class="si o"><i class="fas fa-cash-register"></i></div><div class="sv" style="color:var(--o)">'+fm(cx.saldo)+'</div><div class="sl">Caixa Hoje</div></div>'
+'<div class="sc g"><div class="si g"><i class="fas fa-arrow-down"></i></div><div class="sv" style="color:var(--g)">'+fm(rec.total)+'</div><div class="sl">Receitas Mes</div></div>'
+'<div class="sc r"><div class="si r"><i class="fas fa-arrow-up"></i></div><div class="sv" style="color:var(--r)">'+fm(dsp)+'</div><div class="sl">Despesas Mes</div></div>'
+'<div class="sc '+(luc>=0?'b':'r')+'"><div class="si '+(luc>=0?'b':'r')+'"><i class="fas fa-'+(luc>=0?'trending-up':'trending-down')+'"></i></div><div class="sv" style="color:var('+(luc>=0?'--p':'--r')+')">'+fm(luc)+'</div><div class="sl">Resultado</div></div>'
+'<div class="sc pu"><div class="si pu"><i class="fas fa-exclamation-triangle"></i></div><div class="sv" style="color:var(--r)">'+fm(inad)+'</div><div class="sl">Inadimplencia</div></div>';
}

function rTabs(){
var ts=[{id:'caixa',ic:'cash-register',l:'Caixa do Dia'},{id:'dre',ic:'file-alt',l:'DRE'},{id:'entradas',ic:'arrow-down',l:'Entradas'},{id:'saidas',ic:'arrow-up',l:'Despesas'},{id:'recmens',ic:'file-invoice-dollar',l:'Mensalidades'},{id:'fluxo',ic:'exchange-alt',l:'Fluxo de Caixa'},{id:'relat',ic:'file-excel',l:'Relatorios/Excel'}];
$('tabs').innerHTML=ts.map(function(t){return'<button class="tb'+(curTab===t.id?' active':'')+'" onclick="sTab(\''+t.id+'\')"><i class="fas fa-'+t.ic+'"></i> '+t.l+'</button>'}).join('');
}

function rTab(){
if(curTab==='caixa')rCaixa();else if(curTab==='dre')rDRE();else if(curTab==='entradas')rEnt();else if(curTab==='saidas')rSai();else if(curTab==='recmens')rRecM();else if(curTab==='fluxo')rFlx();else if(curTab==='relat')rRel();
}

// === CAIXA DO DIA ===
function rCaixa(){
var hj=hoje(),cx=cCaixaHoje();
var entHoje=[];var saiHoje=[];
pags.filter(function(p){return p.data_pagamento===hj}).forEach(function(p){entHoje.push({desc:'Mensalidade - '+(p.mensalidades&&p.mensalidades.clientes?p.mensalidades.clientes.nome:''),val:p.valor_pago,forma:ff(p.forma_pagamento),tipo:'Mensalidade'})});
trans.filter(function(t){return t.data===hj&&t.tipo==='entrada'}).forEach(function(t){entHoje.push({desc:t.descricao||t.categoria,val:t.valor,forma:ff(t.forma_pagamento),tipo:t.categoria})});
trans.filter(function(t){return t.data===hj&&t.tipo==='saida'}).forEach(function(t){saiHoje.push({desc:t.descricao||t.categoria,val:t.valor,forma:ff(t.forma_pagamento),tipo:t.categoria})});

var sessData=[['Data','Paciente','Servico','Profissional','Preco Servico','Status','Evolucao']];
sess.forEach(function(s){
sessData.push([fd(s.data_sessao),s.clientes?s.clientes.nome:'-',s.servicos?s.servicos.nome:'-',s.profissionais?s.profissionais.nome:'-',s.servicos?s.servicos.preco:0,s.status||'-',s.evolucao||'']);
});
var ws3=XLSX.utils.aoa_to_sheet(sessData);XLSX.utils.book_append_sheet(wb,ws3,'Servicos Realizados');

// ABA 4: Despesas
var despData=[['Data','Descricao','Categoria','Valor','Forma Pagamento','Observacoes']];
trans.filter(function(t){return t.tipo==='saida'}).forEach(function(t){despData.push([fd(t.data),t.descricao||'',t.categoria||'',t.valor,ff(t.forma_pagamento),t.observacoes||''])});
var ws4=XLSX.utils.aoa_to_sheet(despData);XLSX.utils.book_append_sheet(wb,ws4,'Despesas');

// ABA 5: Entradas Avulsas
var entData=[['Data','Descricao','Categoria','Valor','Forma Pagamento','Observacoes']];
trans.filter(function(t){return t.tipo==='entrada'}).forEach(function(t){entData.push([fd(t.data),t.descricao||'',t.categoria||'',t.valor,ff(t.forma_pagamento),t.observacoes||''])});
var ws5=XLSX.utils.aoa_to_sheet(entData);XLSX.utils.book_append_sheet(wb,ws5,'Entradas Avulsas');

// ABA 6: Fluxo de Caixa completo
var flxData=[['Data','Descricao','Tipo','Categoria','Entrada','Saida','Forma']];
var items=[];
pags.forEach(function(p){items.push({dt:p.data_pagamento,ds:'Mensalidade - '+(p.mensalidades&&p.mensalidades.clientes?p.mensalidades.clientes.nome:''),tp:'entrada',vl:p.valor_pago||0,fr:ff(p.forma_pagamento),cat:'Mensalidade'})});
trans.forEach(function(t){items.push({dt:t.data,ds:t.descricao||'',tp:t.tipo,vl:t.valor||0,fr:ff(t.forma_pagamento),cat:t.categoria||''})});
items.sort(function(a,b){return a.dt>b.dt?1:-1});
items.forEach(function(i){flxData.push([fd(i.dt),i.ds,i.tp==='entrada'?'Entrada':'Saida',i.cat,i.tp==='entrada'?i.vl:'',i.tp==='saida'?i.vl:'',i.fr])});
var ws6=XLSX.utils.aoa_to_sheet(flxData);XLSX.utils.book_append_sheet(wb,ws6,'Fluxo de Caixa');

XLSX.writeFile(wb,'Financeiro_Vecxo_'+gP()+'.xlsx');
sT('Excel exportado com sucesso!');
}

// === EXPORT EXCEL FILTRADO ===
function exportExcelFiltrado(){
var forma=$('relForma')?$('relForma').value:'';
var tipo=$('relTipo')?$('relTipo').value:'';
var de=$('relDe')?$('relDe').value:'';
var ate=$('relAte')?$('relAte').value:'';

var wb=XLSX.utils.book_new();
var data=[['Data','Descricao','Tipo','Categoria','Paciente','Telefone','Plano','Servico','Valor','Forma Pagamento']];

// Mensalidades
if(!tipo||tipo==='mensalidade'){
var pg2=pags;
if(forma)pg2=pg2.filter(function(p){return p.forma_pagamento===forma});
if(de)pg2=pg2.filter(function(p){return p.data_pagamento>=de});
if(ate)pg2=pg2.filter(function(p){return p.data_pagamento<=ate});
pg2.forEach(function(p){
data.push([fd(p.data_pagamento),'Mensalidade','Entrada','Mensalidade',p.mensalidades&&p.mensalidades.clientes?p.mensalidades.clientes.nome:'-',p.mensalidades&&p.mensalidades.clientes?p.mensalidades.clientes.telefone||'':'-',p.mensalidades&&p.mensalidades.planos?p.mensalidades.planos.nome:'-','',p.valor_pago,ff(p.forma_pagamento)]);
});
}

// Transacoes
if(!tipo||tipo==='entrada'||tipo==='saida'){
var tr2=trans;
if(tipo==='entrada'||tipo==='saida')tr2=tr2.filter(function(t){return t.tipo===tipo});
if(forma)tr2=tr2.filter(function(t){return t.forma_pagamento===forma});
if(de)tr2=tr2.filter(function(t){return t.data>=de});
if(ate)tr2=tr2.filter(function(t){return t.data<=ate});
tr2.forEach(function(t){
data.push([fd(t.data),t.descricao||'',t.tipo==='entrada'?'Entrada':'Saida',t.categoria||'','','','','',t.valor,ff(t.forma_pagamento)]);
});
}

var ws=XLSX.utils.aoa_to_sheet(data);XLSX.utils.book_append_sheet(wb,ws,'Relatorio Filtrado');
XLSX.writeFile(wb,'Relatorio_Vecxo_'+gP()+'.xlsx');
sT('Excel filtrado exportado!');
}

function exportCSV(tipo){
var csv='',fn='';
if(tipo==='fluxo'){csv='Data,Descricao,Tipo,Valor,Forma\n';
var items=[];pags.forEach(function(p){items.push({dt:p.data_pagamento,ds:'Mensalidade',tp:'Entrada',vl:p.valor_pago,fr:ff(p.forma_pagamento)})});
trans.forEach(function(t){items.push({dt:t.data,ds:t.descricao||'',tp:t.tipo==='entrada'?'Entrada':'Saida',vl:t.valor,fr:ff(t.forma_pagamento)})});
items.forEach(function(i){csv+=fd(i.dt)+','+i.ds+','+i.tp+','+i.vl+','+i.fr+'\n'});fn='fluxo_'+gP()+'.csv';
}else{csv='Data,Descricao,Categoria,Valor,Forma\n';
trans.filter(function(t){return t.tipo==='saida'}).forEach(function(t){csv+=fd(t.data)+','+(t.descricao||'')+','+(t.categoria||'')+','+t.valor+','+ff(t.forma_pagamento)+'\n'});fn='despesas_'+gP()+'.csv';}
var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();sT('Exportado!');
}

function exportCSVFiltrado(){exportExcelFiltrado()}
