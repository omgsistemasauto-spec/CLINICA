<script>
var SUPABASE_URL = 'https://rdfcosxyeqgbjdedargd.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkZmNvc3h5ZXFnYmpkZWRhcmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MDkxNTQsImV4cCI6MjA3NzA4NTE1NH0.wNx6jQAi9nn2K_E-40VuV6k0sWPoF5bWAw_si__aSyo';

var planos = [], mensalidades = [], pagamentos = [], pacientes = [], parcelas = [];

function el(id) { return document.getElementById(id); }
function sL(t) { el('loadingText').textContent = t || 'Carregando...'; el('loadingOverlay').style.display = 'flex'; }
function hL() { el('loadingOverlay').style.display = 'none'; }
function sT(msg, tipo) {
    var e = el('toast');
    e.className = 'toast ' + (tipo === 'error' ? 'error' : tipo === 'warning' ? 'warning' : 'success') + ' show';
    e.innerHTML = '<i class="fas fa-' + (tipo === 'error' ? 'times-circle' : tipo === 'warning' ? 'exclamation-circle' : 'check-circle') + '"></i> ' + msg;
    setTimeout(function() { e.classList.remove('show'); }, 3500);
}
function fmt(v) { return 'R$ ' + (Number(v) || 0).toFixed(2).replace('.', ','); }
function fmtD(d) { if (!d) return '-'; return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR'); }
function fmtF(f) { return { pix: 'PIX', cartao_credito: 'Cartao Credito', cartao_debito: 'Cartao Debito', dinheiro: 'Dinheiro', boleto: 'Boleto' }[f] || f; }
function diasAtraso(d) { var h = new Date(); h.setHours(0, 0, 0, 0); return Math.floor((h - new Date(d + 'T00:00:00')) / 86400000); }
function openModal(html) { el('modalContent').innerHTML = html; el('modalOverlay').classList.add('show'); }
function closeModal() { el('modalOverlay').classList.remove('show'); }
function switchTab(t) { currentTab = t; renderTabs(); renderTabContent(); }

function badge(s) {
    var map = {
        pago: ['badge-pago', 'Pago'],
        atrasado: ['badge-atrasado', 'Atrasado'],
        vence_hoje: ['badge-vence-hoje', 'Vence Hoje'],
        futuro: ['badge-futuro', 'Futuro'],
        cancelado: ['badge-cancelado', 'Cancelado']
    };
    var b = map[s] || ['badge-cancelado', s];
    return '<span class="badge ' + b[0] + '"><i class="fas fa-circle"></i> ' + b[1] + '</span>';
}

// ============================================================
// CALCULAR PARCELAS — LOGICA CENTRAL IMUTAVEL
// N_meses nas obs = gera EXATAMENTE N parcelas, SEMPRE
// Pagar parcela NAO gera novas. Apenas muda status para pago.
// ============================================================
function calcularParcelas() {
    var hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    parcelas = [];
    mensalidades.filter(function(m) { return m.status !== 'cancelado'; }).forEach(function(m) {
        var plano = planos.find(function(p) { return p.id === m.plano_id; });
        if (!plano) return;

        // Quantos meses tem esse contrato — FIXO, nao muda com pagamentos
        var total;
        if (plano.tipo === 'trimestral') total = 3;
        else if (plano.tipo === 'semestral') total = 6;
        else if (plano.tipo === 'anual') total = 12;
        else {
            var mt = m.observacoes ? m.observacoes.match(/(\d+)_meses/) : null;
            total = mt ? parseInt(mt[1]) : 1;
        }

        var dia = m.dia_vencimento;
        var dtIni = new Date((m.data_inicio || m.data_vencimento) + 'T00:00:00');
        var pags = pagamentos.filter(function(p) { return p.mensalidade_id === m.id; });

        for (var i = 0; i < total; i++) {
            var ano = dtIni.getFullYear();
            // Primeiro vencimento = mes SEGUINTE ao da chegada
            var mes = dtIni.getMonth() + 1 + i;
            ano += Math.floor(mes / 12); mes = mes % 12;
            var vd = new Date(ano, mes, dia); vd.setHours(0, 0, 0, 0);
            var ds = vd.getFullYear() + '-' + String(vd.getMonth() + 1).padStart(2, '0') + '-' + String(dia).padStart(2, '0');
            var r7 = ds.substring(0, 7);
            var pag = pags.find(function(p) {
                // Usa APENAS o comprovante para identificar o mes de referencia
                // data_pagamento nao serve pois pode ser pago em mes diferente
                return p.comprovante && p.comprovante.substring(0, 7) === r7;
            }) || null;
            var st = pag ? 'pago' : vd.getTime() === hoje.getTime() ? 'vence_hoje' : vd < hoje ? 'atrasado' : 'futuro';
            parcelas.push({ id: m.id + '_' + ds, mensalidade_id: m.id, paciente_id: m.paciente_id, plano_id: m.plano_id, clientes: m.clientes, planos: m.planos, valor: m.valor, data_vencimento: ds, _st: st, pagamento: pag });
        }
    });
    parcelas.sort(function(a, b) { return a.data_vencimento > b.data_vencimento ? 1 : -1; });
}

async function init() {
    try {
        sL('Verificando...');
        var sess = await sb.auth.getSession();
        if (!sess.data.session) { window.location.href = 'login.html'; return; }
        user = sess.data.session.user;
        var sr = await sb.from('saloes').select('*').eq('usuario_id', user.id).eq('ativo', true).single();
        if (!sr.data) { alert('Nenhum estabelecimento'); window.location.href = 'login.html'; return; }
        salaoId = sr.data.id;
        el('userName').textContent = user.user_metadata && user.user_metadata.nome ? user.user_metadata.nome : 'Admin';
        el('userAvatar').textContent = (user.user_metadata && user.user_metadata.nome ? user.user_metadata.nome : 'A').charAt(0).toUpperCase();
        await loadAll(); hL();
    } catch (e) { console.error(e); hL(); sT('Erro ao carregar', 'error'); }
}

async function loadAll() {
    sL('Carregando...');
    try {
        var r = await Promise.all([
            sb.from('planos').select('*').eq('salao_id', salaoId).order('nome'),
            sb.from('mensalidades').select('*,clientes(id,nome,telefone),planos(id,nome,tipo)').eq('salao_id', salaoId).order('data_inicio'),
            sb.from('pagamentos_mensalidade').select('*').eq('salao_id', salaoId).order('data_pagamento', { ascending: false }),
            sb.from('clientes').select('id,nome,telefone').eq('salao_id', salaoId).eq('ativo', true).order('nome')
        ]);
        planos = r[0].data || []; mensalidades = r[1].data || []; pagamentos = r[2].data || []; pacientes = r[3].data || [];
        calcularParcelas();
        renderStats(); renderTabs(); renderTabContent();
    } catch (e) { console.error(e); sT('Erro ao carregar', 'error'); }
    hL();
}

function renderStats() {

        '<div class="stat-card red"><div class="stat-top"><div class="stat-icon red"><i class="fas fa-exclamation-triangle"></i></div></div><div class="stat-value">' + atr + '</div><div class="stat-label">Atrasados</div></div>' +

function renderTabs() {

               inadFilter === 'atrasado' ? pend.filter(function(p) { return p._st === 'atrasado'; }) : pend;

    var tc = el('tabContent'); tc.innerHTML = '';

    var card = document.createElement('div'); card.className = 'table-card';

                if (parc._st === 'atrasado' || parc._st === 'vence_hoje') {

async function savePlano() {
    var id = el('planoId').value, nome = el('planoNome').value.trim(), tipo = el('planoTipo').value, valor = parseFloat(el('planoValor').value), desc = el('planoDesc').value.trim();
    if (!nome || !valor) { sT('Preencha nome e valor', 'error'); return; }
    try { sL('Salvando...'); if (id) await sb.from('planos').update({ nome: nome, tipo: tipo, valor: valor, descricao: desc }).eq('id', id); else await sb.from('planos').insert({ nome: nome, tipo: tipo, valor: valor, descricao: desc, salao_id: salaoId, ativo: true }); closeModal(); await loadAll(); sT(id ? 'Atualizado!' : 'Plano criado!'); } catch (e) { hL(); sT('Erro', 'error'); }
}

async function togglePlano(id) {
    var p = planos.find(function(x) { return x.id === id; });
    if (!p || !confirm((p.ativo !== false ? 'Desativar' : 'Reativar') + ' "' + p.nome + '"?')) return;
    await sb.from('planos').update({ ativo: p.ativo === false }).eq('id', id); await loadAll(); sT('Atualizado!');
}

    );
}

function onPlanoChange(sel) {
    var opt = sel.selectedOptions[0];
    if (opt && opt.dataset.valor) el('mensVal').value = parseFloat(opt.dataset.valor);
    var grp = el('qtdGrp');
    if (grp) grp.style.display = (opt && opt.dataset.tipo === 'mensal') ? 'flex' : 'none';
}

function onDataIniChange(val) {
    if (!val) return;
    var diaEl = el('mensDia');
    if (diaEl && !diaEl.value) { var d = new Date(val + 'T12:00:00'); diaEl.value = Math.min(d.getDate(), 28); }
}

async function saveMens() {
    var id = el('mensId').value, pid = el('mensPac').value, plid = el('mensPlan').value, valor = parseFloat(el('mensVal').value), ini = el('mensIni').value;
    if (!pid || !plid || !valor || !ini) { sT('Preencha todos os campos obrigatorios', 'error'); return; }
    var planoSel = planos.find(function(p) { return p.id === plid; });
    var obs = null;
    if (planoSel && planoSel.tipo === 'mensal') {
        var qtdEl = el('mensQtd'); var qtd = qtdEl ? parseInt(qtdEl.value) : 0;
        if (!qtd || qtd < 1) { sT('Informe a quantidade de meses', 'error'); return; }
        obs = qtd + '_meses';
    }
    var dtIni = new Date(ini + 'T00:00:00');
    var diaInput = parseInt((el('mensDia') || {}).value || '0');
    var dia = diaInput >= 1 && diaInput <= 28 ? diaInput : Math.min(dtIni.getDate(), 28);
    var dv = dtIni.getFullYear() + '-' + String(dtIni.getMonth() + 1).padStart(2, '0') + '-' + String(dia).padStart(2, '0');
    var hj = new Date(); hj.setHours(0, 0, 0, 0);
    var st = new Date(dv + 'T00:00:00') < hj ? 'atrasado' : 'pendente';
    try {
        sL('Salvando...');
        var data = { paciente_id: pid, plano_id: plid, valor: valor, data_inicio: ini, dia_vencimento: dia, data_vencimento: dv, observacoes: obs, salao_id: salaoId, status: st };
        if (id) await sb.from('mensalidades').update(data).eq('id', id);
        else await sb.from('mensalidades').insert(data);
        closeModal(); await loadAll(); sT(id ? 'Atualizado!' : 'Mensalidade criada!');
    } catch (e) { hL(); sT('Erro ao salvar', 'error'); }
}

function openPagModal(parcId) {
    var parc = parcelas.find(function(x) { return x.id === parcId; });
    if (!parc) return;
    var hoje = new Date().toISOString().split('T')[0];
    openModal(
        '<div class="modal-header"><h2><i class="fas fa-money-bill-wave" style="color:var(--green)"></i> Registrar Pagamento</h2><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>' +
        '<div class="modal-body"><input type="hidden" id="pagMid" value="' + parc.mensalidade_id + '"><input type="hidden" id="pagRef" value="' + parc.data_vencimento + '">' +
        '<div style="background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:.85rem;margin-bottom:1rem">' +
        '<div style="font-size:.78rem;color:#16A34A;font-weight:600">Paciente</div>' +
        '<div style="font-size:1rem;font-weight:700;color:#15803D">' + (parc.clientes ? parc.clientes.nome : '-') + '</div>' +
        '<div style="font-size:.82rem;color:#16A34A">' + (parc.planos ? parc.planos.nome : '-') + ' - Ref: ' + parc.data_vencimento.substring(0, 7) + ' - Venc: ' + fmtD(parc.data_vencimento) + '</div></div>' +
        '<div class="form-grid">' +
        '<div class="form-group"><label class="form-label required">Valor (R$)</label><input type="number" class="form-input" id="pagVal" step="0.01" value="' + parc.valor + '"></div>' +
        '<div class="form-group"><label class="form-label required">Forma</label><select class="form-select" id="pagFor"><option value="pix">PIX</option><option value="cartao_credito">Cartao Credito</option><option value="cartao_debito">Cartao Debito</option><option value="dinheiro">Dinheiro</option><option value="boleto">Boleto</option></select></div>' +
        '<div class="form-group"><label class="form-label required">Data Pgto</label><input type="date" class="form-input" id="pagDat" value="' + hoje + '"></div>' +
        '<div class="form-group"><label class="form-label">Comprovante</label><input type="text" class="form-input" id="pagComp" placeholder="No ou referencia"></div>' +
        '</div></div>' +
        '<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="registrarPag()"><i class="fas fa-check"></i> Confirmar</button></div>'
    );
}

async function registrarPag() {
    var mid = el('pagMid').value, val = parseFloat(el('pagVal').value), forma = el('pagFor').value, data = el('pagDat').value, comp = el('pagComp').value, ref = el('pagRef').value;
    if (!val || !data) { sT('Preencha valor e data', 'error'); return; }
    // comprovante = YYYY-MM do mes de referencia — assim calcularParcelas encontra pelo ref7
    var compFinal = ref.substring(0, 7) + (comp ? '|' + comp : '');
    try {
        sL('Registrando...');
        await sb.from('pagamentos_mensalidade').insert({ mensalidade_id: mid, valor_pago: val, forma_pagamento: forma, data_pagamento: data, comprovante: compFinal, salao_id: salaoId });
        closeModal(); await loadAll(); sT('Pagamento registrado!');
    } catch (e) { hL(); sT('Erro', 'error'); }
}

function gerarRecibo(parcId) {
    var parc = parcelas.find(function(x) { return x.id === parcId; });
    if (!parc) return;
    var pag = parc.pagamento;
    var txt = 'RECIBO DE PAGAMENTO\n\nPaciente: ' + (parc.clientes ? parc.clientes.nome : '-') + '\nPlano: ' + (parc.planos ? parc.planos.nome : '-') + '\nReferencia: ' + parc.data_vencimento.substring(0, 7) + '\nVencimento: ' + fmtD(parc.data_vencimento) + '\nValor: ' + fmt(pag ? pag.valor_pago : parc.valor) + '\nForma: ' + (pag ? fmtF(pag.forma_pagamento) : '-') + '\nData Pgto: ' + (pag ? fmtD(pag.data_pagamento) : '-') + '\n\nGerado em ' + new Date().toLocaleString('pt-BR');
    var w = window.open('about:blank', '_blank');
    if (w) { w.document.title = 'Recibo'; w.document.body.innerText = txt; w.print(); } else alert(txt);
}

function enviarCobranca(parcId) {
    var parc = parcelas.find(function(x) { return x.id === parcId; });
    if (!parc || !parc.clientes || !parc.clientes.telefone) { sT('Sem telefone', 'error'); return; }
    var tel = parc.clientes.telefone.replace(/\D/g, ''); if (!tel.startsWith('55')) tel = '55' + tel;
    var dias = diasAtraso(parc.data_vencimento);
    var msg = dias > 0 ? 'Ola ' + parc.clientes.nome + '! Sua mensalidade de ' + fmt(parc.valor) + ' esta com ' + dias + ' dias de atraso (venc: ' + fmtD(parc.data_vencimento) + '). Por favor regularize!' : 'Ola ' + parc.clientes.nome + '! Sua mensalidade de ' + fmt(parc.valor) + ' vence hoje (' + fmtD(parc.data_vencimento) + '). Realize o pagamento!';
    window.open('https://wa.me/' + tel + '?text=' + encodeURIComponent(msg), '_blank');
}

function dispararAlertas() {
    var pend = parcelas.filter(function(p) { return p._st === 'atrasado' || p._st === 'vence_hoje'; });
    if (!pend.length) { sT('Nenhum alerta', 'warning'); return; }
    if (!confirm('Enviar alertas para ' + pend.length + ' pacientes?')) return;
    pend.forEach(function(p, i) { setTimeout(function() { enviarCobranca(p.id); }, i * 1500); });
    sT('Abrindo ' + pend.length + ' alertas...');
}

async function handleLogout() { await sb.auth.signOut(); window.location.href = 'login.html'; }
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
