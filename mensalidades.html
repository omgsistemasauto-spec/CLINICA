<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vecxo - Mensalidades</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#5b0082;--primary-dark:#3d0058;--primary-light:#f3e8ff;--green:#10B981;--green-light:#D1FAE5;--red:#EF4444;--red-light:#FEE2E2;--orange:#F59E0B;--orange-light:#FEF3C7;--bg:#F5F0FA;--text:#1E293B;--text2:#334155;--muted:#64748B;--border:#E9D5FF;--shadow:0 2px 12px rgba(91,0,130,.08);--shadow-md:0 4px 20px rgba(91,0,130,.13);--shadow-lg:0 8px 40px rgba(91,0,130,.18);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:linear-gradient(180deg,#1a0030,#2d0050);box-shadow:4px 0 32px rgba(0,0,0,.18);z-index:1000}
.sidebar-logo{padding:1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.9rem}
.sidebar-logo img{width:44px;height:44px;border-radius:12px}
.logo-text{font-size:1.2rem;font-weight:800;color:#fff}
.sidebar-nav{list-style:none;padding:1rem .8rem}
.sidebar-nav a{display:flex;align-items:center;gap:.85rem;padding:.75rem 1rem;color:#c4b5d4;text-decoration:none;font-size:.875rem;font-weight:600;border-radius:12px;transition:all .25s;margin-bottom:.25rem}
.sidebar-nav a:hover{background:rgba(255,255,255,.07);color:#fff}
.sidebar-nav a.active{background:linear-gradient(90deg,rgba(255,255,255,.15),rgba(255,255,255,.05));color:#fff;border-left:3px solid #c084fc;padding-left:calc(1rem - 3px)}
.sidebar-nav i{width:20px;text-align:center}
.sidebar-footer{position:absolute;bottom:0;left:0;right:0;padding:1rem;border-top:1px solid rgba(255,255,255,.08)}
.user-info{display:flex;align-items:center;gap:.7rem;padding:.65rem .8rem;background:rgba(255,255,255,.07);border-radius:12px}
.user-avatar{width:36px;height:36px;background:linear-gradient(135deg,#9333ea,#5b0082);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.9rem;flex-shrink:0}
.user-details{flex:1}.user-name{font-size:.82rem;font-weight:700;color:#fff}.user-role{font-size:.7rem;color:#a78bca}
.logout-btn{width:32px;height:32px;border:1px solid rgba(255,255,255,.15);background:transparent;border-radius:8px;color:#a78bca;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.logout-btn:hover{background:rgba(239,68,68,.2);color:#fca5a5}
.main-content{margin-left:260px;min-height:100vh;display:flex;flex-direction:column}
.alert-banner{background:linear-gradient(90deg,#B91C1C,#DC2626);color:#fff;padding:.65rem 1.5rem;display:none;align-items:center;gap:.75rem;font-size:.82rem;font-weight:600}
.alert-banner.show{display:flex}
.header{background:#fff;padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.header-left h1{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.header-left p{font-size:.78rem;color:var(--muted);margin-top:2px}
.header-actions{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.content{padding:1.25rem 1.5rem;flex:1}

/* BOTAO GIGANTE — dentro do grid de 4 */
.btn-giant{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:1.2rem .75rem;background:linear-gradient(135deg,#059669,#10B981);color:#fff;border:none;border-radius:16px;font-family:'Poppins',sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(16,185,129,.4);transition:all .25s;letter-spacing:.1px;flex-direction:column;gap:.4rem}
.btn-giant:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(16,185,129,.5)}
.btn-giant i{font-size:1.6rem}

.btn{padding:.6rem 1.2rem;border-radius:12px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem;font-family:'Poppins',sans-serif;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#059669;transform:translateY(-1px)}
.btn-ghost{background:#F1F5F9;color:var(--text2);border:1px solid #E2E8F0}.btn-ghost:hover{background:#E2E8F0}
.btn-sm{padding:.4rem .8rem;font-size:.78rem;border-radius:9px}
.btn-lg{padding:.8rem 1.6rem;font-size:.95rem;font-weight:700;border-radius:14px}

.tip{position:relative;display:inline-flex;align-items:center}
.tip .tip-icon{width:17px;height:17px;background:#EDE9FE;color:#7C3AED;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;cursor:help;margin-left:.3rem;flex-shrink:0;border:none}
.tip .tip-text{position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:.71rem;font-weight:500;padding:.45rem .75rem;border-radius:8px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s;max-width:240px;white-space:normal;text-align:center;line-height:1.45;min-width:120px}
.tip:hover .tip-text{opacity:1}
.tip .tip-text::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:1rem}
.stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.stat-icon.purple{background:var(--primary-light);color:var(--primary)}
.stat-icon.green{background:var(--green-light);color:#059669}
.stat-icon.orange{background:var(--orange-light);color:#D97706}
.stat-icon.red{background:var(--red-light);color:#DC2626}
.stat-body{flex:1}.stat-value{font-size:1.6rem;font-weight:800;line-height:1}.stat-label{font-size:.73rem;color:var(--muted);font-weight:500;margin-top:3px}
.stat-value.green{color:#059669}.stat-value.orange{color:#D97706}.stat-value.red{color:#DC2626}.stat-value.purple{color:var(--primary)}

/* NAVEGACAO + BOTAO GIGANTE — 4 na mesma linha */
.nav-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.5rem}
.nav-pills{display:contents}
.pill-btn{padding:1.2rem .75rem;border:none;border-radius:16px;font-size:.88rem;font-weight:800;cursor:pointer;transition:all .25s;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.4rem;color:#fff;opacity:.5;box-shadow:0 4px 14px rgba(0,0,0,.1)}
.pill-btn i{font-size:1.6rem}
.pill-btn .pill-label{font-size:.82rem;font-weight:800}
.pill-btn.active{opacity:1;transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.22)}
.pill-btn:hover{opacity:.85;transform:translateY(-2px)}
#pill-painel{background:linear-gradient(135deg,#5b0082,#9333ea)}
#pill-mensalidades{background:linear-gradient(135deg,#C2410C,#F97316)}
#pill-historico{background:linear-gradient(135deg,#1D4ED8,#3B82F6)}

.painel-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.painel-col{display:flex;flex-direction:column;gap:1rem}
.section-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.section-header{padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;border-bottom:1px solid #F3E8FF}
.section-header-left{display:flex;align-items:center;gap:.6rem}
.section-title{font-size:.95rem;font-weight:700}
.section-count{font-size:.72rem;font-weight:700;padding:.25rem .7rem;border-radius:20px}
.section-count.orange{background:var(--orange-light);color:#B45309}
.section-count.red{background:var(--red-light);color:#B91C1C}
.section-count.green{background:var(--green-light);color:#065F46}
.section-count.purple{background:var(--primary-light);color:var(--primary)}

.pac-item{padding:.85rem 1.1rem;border-bottom:1px solid #FAF5FF;display:flex;align-items:flex-start;gap:.8rem;transition:background .15s}
.pac-item:last-child{border-bottom:none}
.pac-item:hover{background:#FAF5FF}

/* NOVO CARD DE PACIENTE — botoes grandes */
.pac-item-card{padding:1rem 1.2rem;border-bottom:2px solid #F3E8FF;transition:background .15s}
.pac-item-card:last-child{border-bottom:none}
.pac-item-card.atraso{background:#FFF5F5;border-left:4px solid #EF4444}
.pac-item-card.hoje-card{background:#FFFBEB;border-left:4px solid #F59E0B}
.pac-item-card:hover{background:#FAF5FF}
.pac-item-card.atraso:hover{background:#FEE2E2}
.pac-card-top{display:flex;align-items:center;gap:.85rem;margin-bottom:.85rem}
.pac-card-info{flex:1;min-width:0}
.pac-nome-big{font-size:.95rem;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pac-tel{font-size:.75rem;color:var(--muted);margin-top:.15rem;display:flex;align-items:center;gap:.3rem}
.pac-card-valor{text-align:right;flex-shrink:0}
.pac-valor-big{font-size:1.25rem;font-weight:900;color:var(--primary);line-height:1}
.pac-card-btns{display:flex;gap:.6rem;flex-wrap:wrap}

/* BOTOES DE ACAO GRANDES */
.pac-card-btns{display:grid;grid-template-columns:1fr 1fr auto auto;gap:.5rem;align-items:stretch}
.btn-card-action{display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.75rem 1rem;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap;width:100%}
.btn-card-action i{font-size:1rem;flex-shrink:0}
.btn-card-action.pagar{background:var(--green);color:#fff;box-shadow:0 3px 10px rgba(16,185,129,.3)}
.btn-card-action.pagar:hover{background:#059669;transform:translateY(-2px);box-shadow:0 5px 16px rgba(16,185,129,.4)}
.btn-card-action.whatsapp{background:#25D366;color:#fff;box-shadow:0 3px 10px rgba(37,211,102,.3)}
.btn-card-action.whatsapp:hover{background:#128C7E;transform:translateY(-2px);box-shadow:0 5px 16px rgba(37,211,102,.4)}
.btn-card-action.editar{background:#EDE9FE;color:#6D28D9;}
.btn-card-action.editar:hover{background:#DDD6FE;transform:translateY(-2px)}
.btn-card-action.excluir{background:#FEE2E2;color:#B91C1C;}
.btn-card-action.excluir:hover{background:#FECACA;transform:translateY(-2px)}
.vence-tag{font-size:.72rem;font-weight:600;color:var(--muted);margin-top:.3rem;display:block}
.pac-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#9333ea,#5b0082);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:800;flex-shrink:0}
.pac-avatar.red{background:linear-gradient(135deg,#EF4444,#B91C1C)}
.pac-avatar.orange{background:linear-gradient(135deg,#F59E0B,#D97706)}
.pac-info{flex:1;min-width:0}
.pac-nome{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pac-sub{font-size:.72rem;color:var(--muted);margin-top:2px}
.pac-meta{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.pac-valor{font-size:1rem;font-weight:800;color:var(--primary)}
.pac-acoes{display:flex;gap:.3rem;flex-wrap:wrap;justify-content:flex-end;margin-top:.4rem}
.atraso-tag{font-size:.72rem;font-weight:800;padding:.22rem .6rem;border-radius:20px;background:var(--red-light);color:#B91C1C;white-space:nowrap}
.atraso-tag.hoje{background:var(--orange-light);color:#B45309}

.dia-sep{padding:.45rem 1.1rem .3rem;display:flex;align-items:center;gap:.6rem;background:#F9F5FF;border-bottom:1px solid #EDE9FE}
.dia-sep-label{font-size:.7rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.5px}
.dia-sep-line{flex:1;height:1px;background:#E9D5FF}
.dia-sep-badge{font-size:.68rem;font-weight:700;padding:.15rem .55rem;border-radius:20px}
.dia-sep-badge.hoje{background:var(--orange-light);color:#B45309}
.dia-sep-badge.futuro{background:var(--primary-light);color:var(--primary)}
.plano-tag{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:8px;background:var(--primary-light);color:var(--primary);display:inline-block}

.act-btn{padding:.38rem .7rem;border:none;border-radius:9px;cursor:pointer;font-size:.72rem;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:.3rem;font-family:'Poppins',sans-serif;white-space:nowrap}
.act-btn.pagar{background:var(--green-light);color:#065F46}.act-btn.pagar:hover{background:#A7F3D0}
.act-btn.whatsapp{background:#DCFCE7;color:#15803D}.act-btn.whatsapp:hover{background:#BBF7D0}
.act-btn.editar{background:#EDE9FE;color:#6D28D9}.act-btn.editar:hover{background:#DDD6FE}
.act-btn.recibo{background:#DBEAFE;color:#1D4ED8}.act-btn.recibo:hover{background:#BFDBFE}
.act-btn.encerrar{background:var(--orange-light);color:#B45309}
.act-btn.excluir{background:var(--red-light);color:#B91C1C}

.badge{padding:.25rem .6rem;border-radius:20px;font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;gap:.3rem}
.badge-pago{background:var(--green-light);color:#065F46}
.badge-atrasado{background:var(--red-light);color:#B91C1C}
.badge-hoje{background:var(--orange-light);color:#B45309}
.badge-futuro{background:var(--primary-light);color:var(--primary)}
.badge-cancelado{background:#F1F5F9;color:var(--muted)}

.empty-state{text-align:center;padding:2.5rem 1rem}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.empty-state h3{font-size:.95rem;color:var(--text2);font-weight:600}
.empty-state p{font-size:.78rem;color:var(--muted);margin-top:.3rem}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:#F9F5FF}
th{padding:.6rem .9rem;text-align:left;font-size:.72rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:.7rem .9rem;font-size:.82rem;border-top:1px solid #F3E8FF;color:var(--text2)}
tr:hover{background:#FAF5FF}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(30,0,50,.6);z-index:5000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:740px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-wide{max-width:860px}
.modal-header{padding:1.2rem 1.4rem;border-bottom:1px solid #EDE9FE;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:20px 20px 0 0}
.modal-header h2{font-size:1.05rem;font-weight:800;display:flex;align-items:center;gap:.5rem}
.modal-close{width:34px;height:34px;border:none;background:#F1F5F9;border-radius:10px;cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--red-light);color:var(--red)}
.modal-body{padding:1.4rem}.modal-footer{padding:.9rem 1.4rem;border-top:1px solid #EDE9FE;display:flex;gap:.6rem;justify-content:flex-end;position:sticky;bottom:0;background:#fff;border-radius:0 0 20px 20px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-group.full{grid-column:1/-1}
.form-label{font-size:.78rem;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:.25rem}
.form-label.req::after{content:' *';color:var(--red)}
.form-input,.form-select,.form-textarea{padding:.6rem .85rem;border:1.5px solid #E9D5FF;border-radius:10px;font-size:.88rem;font-family:'Poppins',sans-serif;background:#fff;color:var(--text);transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(91,0,130,.1)}
.form-input.big{font-size:1.1rem;font-weight:700;padding:.7rem .9rem}
.info-box{background:#F9F5FF;border:1px solid #E9D5FF;border-radius:12px;padding:.85rem 1rem;font-size:.82rem;color:var(--primary);display:flex;align-items:flex-start;gap:.6rem;margin-bottom:.85rem}
.warn-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:.75rem 1rem;font-size:.78rem;color:#92400E;display:flex;align-items:flex-start;gap:.5rem;margin-top:.75rem}
.sec-label{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:1.2rem 0 .6rem;display:flex;align-items:center;gap:.5rem}
.sec-label::after{content:'';flex:1;height:1px;background:#EDE9FE}

/* PARCELAS NO MODAL */
.parcela-lista{display:flex;flex-direction:column;gap:.5rem;margin-top:.5rem}
.parcela-row{display:grid;grid-template-columns:auto 1fr 1fr auto;align-items:center;gap:.75rem;background:#F9F5FF;border:1.5px solid #EDE9FE;border-radius:12px;padding:.75rem 1rem;transition:all .2s}
.parcela-row.pago{background:#F0FDF4;border-color:#A7F3D0}
.parc-num{width:32px;height:32px;background:var(--primary-light);color:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0}
.parc-num.pago{background:var(--green-light);color:#059669}
.parc-info{display:flex;flex-direction:column;gap:.15rem}
.parc-mes{font-size:.82rem;font-weight:700;color:var(--text)}
.parc-venc{font-size:.7rem;color:var(--muted)}
.parc-val-wrap{display:flex;align-items:center;gap:.4rem}
.parc-val-prefix{font-size:.78rem;font-weight:700;color:var(--muted)}
.parc-val-input{width:110px;padding:.4rem .65rem;border:1.5px solid #E9D5FF;border-radius:9px;font-size:.88rem;font-weight:700;font-family:'Poppins',sans-serif;color:var(--primary);background:#fff;text-align:right}
.parc-val-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px rgba(16,185,129,.12)}
.parc-val-input.pago-input{background:var(--green-light);border-color:#A7F3D0;color:#059669}
.btn-pago{padding:.45rem .9rem;border:2px solid #E9D5FF;background:#fff;border-radius:10px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:'Poppins',sans-serif;display:flex;align-items:center;gap:.4rem;transition:all .2s;white-space:nowrap;color:var(--muted)}
.btn-pago:hover{border-color:var(--green);color:#059669;background:var(--green-light)}
.btn-pago.marcado{background:var(--green);color:#fff;border-color:var(--green)}
.btn-pago.marcado:hover{background:#059669}

/* LOADING / TOAST */
.loading-overlay{position:fixed;inset:0;background:rgba(91,0,130,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;color:#fff}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top:4px solid #fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;right:20px;padding:.75rem 1.1rem;border-radius:12px;color:#fff;font-size:.82rem;font-weight:600;z-index:9999;transform:translateX(120%);transition:transform .3s;display:flex;align-items:center;gap:.45rem;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.warning{background:var(--orange)}
.hamburger{display:none;position:fixed;top:.85rem;left:.85rem;z-index:1100;width:38px;height:38px;border:none;background:#fff;border-radius:10px;box-shadow:var(--shadow-md);cursor:pointer;font-size:1.1rem;color:var(--text);align-items:center;justify-content:center}
@media(max-width:1100px){.painel-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}

function calcularParcelas(){
  var hoje=new Date();hoje.setHours(0,0,0,0);
  parcelas=[];
  mensalidades.filter(function(m){return m.status!=='cancelado'&&(!m.clientes||m.clientes.ativo!==false)}).forEach(function(m){
    var plano=planos.find(function(p){return p.id===m.plano_id});
    if(!plano)return;
    var total;
    if(plano.tipo==='trimestral')total=3;
    else if(plano.tipo==='semestral')total=6;
    else if(plano.tipo==='anual')total=12;
    else{var mt=m.observacoes?m.observacoes.match(/(\d+)_meses/):null;total=mt?parseInt(mt[1]):1}
    var dia=m.dia_vencimento;
    var dtIni=new Date((m.data_inicio||m.data_vencimento)+'T00:00:00');
    var pags=pagamentos.filter(function(p){return p.mensalidade_id===m.id});
    for(var i=0;i<total;i++){
      var ano=dtIni.getFullYear();
      var mes=dtIni.getMonth()+1+i;
      ano+=Math.floor(mes/12);mes=mes%12;
      var vd=new Date(ano,mes,dia);vd.setHours(0,0,0,0);
      var ds=vd.getFullYear()+'-'+String(vd.getMonth()+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
      var r7=ds.substring(0,7);
      var pag=pags.find(function(p){return p.comprovante&&p.comprovante.substring(0,7)===r7})||null;
      var st=pag?'pago':vd.getTime()===hoje.getTime()?'vence_hoje':vd<hoje?'atrasado':'futuro';
      parcelas.push({id:m.id+'_'+ds,mensalidade_id:m.id,paciente_id:m.paciente_id,plano_id:m.plano_id,clientes:m.clientes,planos:m.planos,valor:m.valor,data_vencimento:ds,_st:st,pagamento:pag});
    }
  });
  parcelas.sort(function(a,b){return a.data_vencimento>b.data_vencimento?1:-1});
}

function mkPacItem(p,isHoje,isAtraso){
  var div=document.createElement('div');
  div.className='pac-item-card'+(isAtraso?' atraso':isHoje?' hoje-card':'');
  var dias=diasAtraso(p.data_vencimento);
  var ini=(p.clientes&&p.clientes.nome?p.clientes.nome:'?').charAt(0).toUpperCase();
  var nome=p.clientes?p.clientes.nome:'-';
  var tel=p.clientes&&p.clientes.telefone?p.clientes.telefone:'';
  var atrasoHtml='';
  if(isAtraso) atrasoHtml='<span class="atraso-tag">⚠️ '+dias+' dias em atraso</span>';
  else if(isHoje) atrasoHtml='<span class="atraso-tag hoje">🔔 Vence hoje</span>';
  else atrasoHtml='<span class="vence-tag">📅 Vence '+fmtD(p.data_vencimento)+'</span>';

  div.innerHTML=
    '<div class="pac-card-top">'+
      '<div class="pac-avatar'+(isAtraso?' red':isHoje?' orange':'')+'">'+ini+'</div>'+
      '<div class="pac-card-info">'+
        '<div class="pac-nome-big">'+nome+'</div>'+
        (tel?'<div class="pac-tel"><i class="fab fa-whatsapp" style="color:#25D366"></i> '+tel+'</div>':'')+
      '</div>'+
      '<div class="pac-card-valor">'+
        '<div class="pac-valor-big">'+fmt(p.valor)+'</div>'+
        atrasoHtml+
      '</div>'+
    '</div>'+
    '<div class="pac-card-btns" id="ac_'+p.id.replace(/[^a-zA-Z0-9]/g,'_')+'"></div>';

  setTimeout(function(){
    var acId='ac_'+p.id.replace(/[^a-zA-Z0-9]/g,'_');
    var acDiv=document.getElementById(acId);if(!acDiv)return;
    // grid: pagar | whatsapp(se tiver) | editar | excluir
    acDiv.style.gridTemplateColumns=tel?'1fr 1fr auto auto':'1fr auto auto';

    // BOTAO PAGAR — grande, verde, destaque total

    bPag.className='btn-card-action pagar';
    bPag.innerHTML='<i class="fas fa-check-circle"></i><span>Marcar como Pago</span>';
    bPag.onclick=(function(pid){return function(e){e.stopPropagation();openPagModal(pid)}})(p.id);
    acDiv.appendChild(bPag);

    // BOTAO WHATSAPP — grande, verde WhatsApp
    if(tel){
      var bWa=document.createElement('button');
      bWa.className='btn-card-action whatsapp';
      bWa.innerHTML='<i class="fab fa-whatsapp"></i><span>Cobrar pelo WhatsApp</span>';
      bWa.onclick=(function(pid){return function(e){e.stopPropagation();enviarCobranca(pid)}})(p.id);
      acDiv.appendChild(bWa);
    }

    // BOTAO EDITAR — menor, secundario
    var bEdt=document.createElement('button');
    bEdt.className='btn-card-action editar';
    bEdt.innerHTML='<i class="fas fa-edit"></i><span>Editar</span>';
    bEdt.onclick=(function(mid){return function(e){e.stopPropagation();openMensModal(mid)}})(p.mensalidade_id);
    acDiv.appendChild(bEdt);

    // BOTAO EXCLUIR — vermelho, abre modal de escolha
    var bDel=document.createElement('button');
    bDel.className='btn-card-action excluir';
    bDel.innerHTML='<i class="fas fa-trash"></i><span>Excluir</span>';
    bDel.onclick=(function(mid,pnome,pacId){return function(e){e.stopPropagation();openExcluirPacienteModal(mid,pnome,pacId)}})(p.mensalidade_id,nome,p.paciente_id);
    acDiv.appendChild(bDel);

function badgeHtml(s){
  var m={pago:['badge-pago','fa-check-circle','Pago'],atrasado:['badge-atrasado','fa-exclamation-triangle','Atrasado'],vence_hoje:['badge-hoje','fa-clock','Vence Hoje'],futuro:['badge-futuro','fa-hourglass-half','Futuro'],cancelado:['badge-cancelado','fa-times','Cancelado']};
  var b=m[s]||['badge-cancelado','fa-circle',s];
  return '<span class="badge '+b[0]+'"><i class="fas '+b[1]+'"></i> '+b[2]+'</span>';
}

function renderMens(){
  // Agrupa por mensalidade_id usando a lista completa de mensalidades (inclui inativos/cancelados)
  var lista=mensalidades.map(function(m){
    // Calcula parcelas desta mensalidade especificamente
    var plano=planos.find(function(p){return p.id===m.plano_id});
    var total=1;
    if(plano){
      if(plano.tipo==='trimestral')total=3;
      else if(plano.tipo==='semestral')total=6;
      else if(plano.tipo==='anual')total=12;
      else{var mt=m.observacoes?m.observacoes.match(/(\d+)_meses/):null;total=mt?parseInt(mt[1]):1}
    }
    var listaParc=parcelas.filter(function(p){return p.mensalidade_id===m.id});
    // Se nao tem parcelas calculadas (inativo), usa total do plano
    var pagas=listaParc.filter(function(x){return x._st==='pago'}).length;
    var atrasadas=listaParc.filter(function(x){return x._st==='atrasado'}).length;
    var pacInativo=m.clientes&&m.clientes.ativo===false;
    var mensCancelada=m.status==='cancelado';
    return{m:m,plano:plano,listaParc:listaParc,total:total,pagas:pagas,atrasadas:atrasadas,pacInativo:pacInativo,mensCancelada:mensCancelada};
  });
  lista.sort(function(a,b){
    // Inativos vao pro final
    if(a.pacInativo&&!b.pacInativo)return 1;
    if(!a.pacInativo&&b.pacInativo)return -1;
    return(a.m.clientes?a.m.clientes.nome:'')>(b.m.clientes?b.m.clientes.nome:'')?1:-1;
  });

  var hdr=document.createElement('div');hdr.className='section-header';

  var inativos=lista.filter(function(g){return g.pacInativo||g.mensCancelada}).length;

    '<span class="section-count purple">'+ativos+' ativos</span>'+
    (inativos?'<span class="section-count" style="background:#F1F5F9;color:#64748B">'+inativos+' inativos</span>':'')+

  card.appendChild(hdr);
  var wrap=document.createElement('div');wrap.className='table-wrap';
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>Paciente</th><th>Valor/Mes</th><th>Parcelas Pagas</th><th>Situacao</th><th>Acoes</th></tr></thead>';
  var tbody=document.createElement('tbody');
  if(!lista.length){
    tbody.innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📋</div><h3>Nenhum contrato cadastrado</h3><p>Use o botao grande acima para comecar</p></div></td></tr>';
  }else{
    lista.forEach(function(g,i){
      var m=g.m;
      var inativo=g.pacInativo||g.mensCancelada;
      var ini=(m.clientes&&m.clientes.nome?m.clientes.nome:'?').charAt(0).toUpperCase();
      var rowId='det_'+i;
      var sit='';

        sit='<span class="badge" style="background:#E2E8F0;color:#475569;font-weight:800;padding:.3rem .9rem"><i class="fas fa-ban"></i> INATIVO</span>';

        sit='<span class="badge badge-atrasado"><i class="fas fa-exclamation-triangle"></i> '+g.atrasadas+' em atraso</span>';
      }else{

      }
      var tr=document.createElement('tr');tr.style.cursor='pointer';

function renderHist(){

  }else{
    pagamentos.forEach(function(pag){
      var mens=mensalidades.find(function(m){return m.id===pag.mensalidade_id});
      var nomePac=mens&&mens.clientes?mens.clientes.nome:'-';
      var r7=pag.comprovante?pag.comprovante.substring(0,7):(pag.data_pagamento?pag.data_pagamento.substring(0,7):'');
      var parc=parcelas.find(function(x){return x.mensalidade_id===pag.mensalidade_id&&x.data_vencimento.substring(0,7)===r7});
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+fmtD(pag.data_pagamento)+'</td><td style="font-weight:700">'+nomePac+'</td><td style="font-weight:800;color:var(--green)">'+fmt(pag.valor_pago)+'</td><td>'+fmtF(pag.forma_pagamento)+'</td><td></td>';
      var td=tr.querySelector('td:last-child');
      var bDiv2=document.createElement('div');bDiv2.style.cssText='display:flex;gap:.35rem;flex-wrap:wrap';
      if(parc){
        var bR2=document.createElement('button');bR2.className='act-btn recibo';bR2.innerHTML='<i class="fas fa-receipt"></i> Ver Recibo';
        bR2.onclick=(function(pid){return function(){gerarRecibo(pid)}})(parc.id);bDiv2.appendChild(bR2);
      }
      // Excluir este pagamento do historico
      var bDelH=document.createElement('button');bDelH.className='act-btn excluir';bDelH.innerHTML='<i class="fas fa-trash"></i> Excluir Pagamento';
      bDelH.title='Remove este registro de pagamento. A parcela voltara ao status anterior.';
      bDelH.onclick=(function(pagId){return function(){excluirPagamentoById(pagId)}})(pag.id);bDiv2.appendChild(bDelH);
      td.appendChild(bDiv2);
      tbody.appendChild(tr);
    });
  }
  tbl.appendChild(tbody);wrap.appendChild(tbl);card.appendChild(wrap);tc.appendChild(card);
}

async function init(){
  try{
    sL('Verificando acesso...');
    var sess=await sb.auth.getSession();
    if(!sess.data.session){window.location.href='login.html';return}
    user=sess.data.session.user;
    var sr=await sb.from('saloes').select('*').eq('usuario_id',user.id).eq('ativo',true).single();
    if(!sr.data){alert('Nenhum estabelecimento');window.location.href='login.html';return}
    salaoId=sr.data.id;
    el('userName').textContent=user.user_metadata&&user.user_metadata.nome?user.user_metadata.nome:'Admin';
    el('userAvatar').textContent=(user.user_metadata&&user.user_metadata.nome?user.user_metadata.nome:'A').charAt(0).toUpperCase();
    await loadAll();hL();
  }catch(e){console.error(e);hL();sT('Erro ao carregar','error')}
}

async function loadAll(){
  sL('Carregando...');
  try{
    var r=await Promise.all([
      sb.from('planos').select('*').eq('salao_id',salaoId).order('nome'),
      sb.from('mensalidades').select('*,clientes(id,nome,telefone,ativo,status),planos(id,nome,tipo)').eq('salao_id',salaoId).order('data_inicio'),
      sb.from('pagamentos_mensalidade').select('*').eq('salao_id',salaoId).order('data_pagamento',{ascending:false}),
      sb.from('clientes').select('id,nome,telefone,ativo,status').eq('salao_id',salaoId).order('nome')
    ]);
    planos=r[0].data||[];mensalidades=r[1].data||[];pagamentos=r[2].data||[];pacientes=r[3].data||[];
    calcularParcelas();renderStats();renderTabContent();
  }catch(e){console.error(e);sT('Erro ao carregar','error')}
  hL();
}

function nmGerarParcelas(){
  var valor=parseFloat((el('nm_valor')||{}).value||0);
  var dia=parseInt((el('nm_dia')||{}).value||0);
  var qtd=parseInt((el('nm_qtd')||{}).value||0);
  if(!qtd||qtd<1||!dia||dia<1||dia>28||!valor||valor<=0){
    var bloco=el('nm_parcelas_bloco');if(bloco)bloco.style.display='none';
    return;
  }
  var entradaVal=(el('nm_entrada')||{}).value||new Date().toISOString().split('T')[0];
  var dtIni=new Date(entradaVal+'T00:00:00');
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var novas=[];
  for(var i=0;i<qtd;i++){
    var ano=dtIni.getFullYear();
    var mes=dtIni.getMonth()+1+i;
    ano+=Math.floor(mes/12);mes=mes%12;
    var vd=new Date(ano,mes,dia);vd.setHours(0,0,0,0);
    var ds=vd.getFullYear()+'-'+String(vd.getMonth()+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
    var retroativa=vd<hoje;
    // Preserva toggle manual do usuario; senao auto-marca retroativas como pagas
    var prev=novaParcelaState[i];
    var userToggled=prev&&prev._userToggled;
    var pago=userToggled?prev.pago:retroativa;
    novas.push({ref:ds,valor:valor,pago:pago,retroativa:retroativa,_userToggled:userToggled||false});
  }
  novaParcelaState=novas;
  renderNovaParcelaLista();
}


function renderNovaParcelaLista(){
  var bloco=el('nm_parcelas_bloco');
  var lista=el('nm_parcelas_lista');
  if(!bloco||!lista)return;
  if(!novaParcelaState.length){bloco.style.display='none';return}
  bloco.style.display='block';
  lista.innerHTML='';
  novaParcelaState.forEach(function(p,i){
    var dtObj=new Date(p.ref+'T12:00:00');
    var mesNome=dtObj.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    var div=document.createElement('div');
    div.className='parcela-row'+(p.pago?' pago':'');
    div.id='pr_'+i;
    div.innerHTML=
      '<div class="parc-num'+(p.pago?' pago':'')+'">'+( i+1)+'</div>'+
      '<div class="parc-info"><div class="parc-mes">'+mesNome+'</div><div class="parc-venc">Vence: '+fmtD(p.ref)+(p.atrasado&&!p.pago?' <span style="color:#DC2626;font-weight:700">(em atraso)</span>':'')+'</div></div>'+
      '<div class="parc-val-wrap"><span class="parc-val-prefix">R$</span><input type="number" class="parc-val-input'+(p.pago?' pago-input':'')+'" id="pv_'+i+'" step="0.01" value="'+p.valor.toFixed(2)+'" '+(p.pago?'readonly':'')+' onchange="nmUpdateValor('+i+',this.value)"></div>'+
      '<button class="btn-pago'+(p.pago?' marcado':'')+'" onclick="nmTogglePago('+i+')" id="pbtn_'+i+'">'+
      (p.pago?'<i class="fas fa-check-circle"></i> JA FOI PAGO':'<i class="far fa-circle"></i> Marcar como Ja Pago')+
      '</button>';
    lista.appendChild(div);
  });
}

function nmUpdateValor(i,v){
  if(novaParcelaState[i])novaParcelaState[i].valor=parseFloat(v)||0;
}

function nmTogglePago(i){
  if(!novaParcelaState[i])return;
  novaParcelaState[i].pago=!novaParcelaState[i].pago;
  novaParcelaState[i]._userToggled=true;
  renderNovaParcelaLista();
}

async function salvarNovaMens(){
  var nome=(el('nm_nome')||{}).value;
  if(!nome||!nome.trim()){sT('Informe o nome do paciente','error');return}
  var valor=parseFloat((el('nm_valor')||{}).value||0);
  if(!valor||valor<=0){sT('Informe o valor da mensalidade','error');return}
  var dia=parseInt((el('nm_dia')||{}).value||0);
  if(!dia||dia<1||dia>28){sT('Informe o dia de vencimento (1 a 28)','error');return}
  var qtd=parseInt((el('nm_qtd')||{}).value||0);
  if(!qtd||qtd<1){sT('Informe quantos meses o paciente ficara','error');return}
  if(!novaParcelaState.length){sT('Preencha os campos acima para gerar as mensalidades','error');return}
  var obs=qtd+'_meses';
  var entradaVal=(el('nm_entrada')||{}).value||new Date().toISOString().split('T')[0];
  var tel=((el('nm_tel')||{}).value||'').trim();
  var dtIni=new Date(entradaVal+'T00:00:00');
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var dv=dtIni.getFullYear()+'-'+String(dtIni.getMonth()+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
  var st=new Date(dv+'T00:00:00')<hoje?'atrasado':'pendente';
  // Busca ou cria plano padrao "Mensal" para compatibilidade com calcularParcelas
  var planoPadrao=planos.find(function(p){return p.tipo==='mensal'&&p.ativo!==false});
  try{
    sL('Cadastrando paciente...');
    // 1. Se nao tiver plano padrao, cria um
    var planoId=planoPadrao?planoPadrao.id:null;
    if(!planoId){
      var rPl=await sb.from('planos').insert({nome:'Mensal',tipo:'mensal',valor:valor,salao_id:salaoId,ativo:true}).select('id').single();
      if(rPl.error)throw rPl.error;
      planoId=rPl.data.id;
    }
    // 2. Criar paciente
    var pacData={salao_id:salaoId,nome:nome.trim(),ativo:true,status:'ativo',permite_sms:true,permite_email:true,permite_whatsapp:true};
    if(tel)pacData.telefone=tel;
    var rPac=await sb.from('clientes').insert(pacData).select('id').single();
    if(rPac.error)throw rPac.error;
    var pacId=rPac.data.id;
    sL('Criando mensalidade...');
    // 3. Criar mensalidade
    var mensData={paciente_id:pacId,plano_id:planoId,valor:valor,data_inicio:entradaVal,dia_vencimento:dia,data_vencimento:dv,observacoes:obs,salao_id:salaoId,status:st};
    var rMens=await sb.from('mensalidades').insert(mensData).select('id').single();
    if(rMens.error)throw rMens.error;
    var mensId=rMens.data.id;
    // 4. Registrar mensalidades marcadas como pagas
    var pagas=novaParcelaState.filter(function(p){return p.pago});
    if(pagas.length){
      sL('Registrando '+pagas.length+' pagamentos...');
      var hoje2=new Date().toISOString().split('T')[0];
      var inserts=pagas.map(function(p){return{mensalidade_id:mensId,valor_pago:p.valor,forma_pagamento:'dinheiro',data_pagamento:hoje2,comprovante:p.ref.substring(0,7),salao_id:salaoId}});
      var rPag=await sb.from('pagamentos_mensalidade').insert(inserts);
      if(rPag.error)throw rPag.error;
    }
    closeModal();await loadAll();
    sT(pagas.length?'Cadastrado! '+pagas.length+' mensalidades ja marcadas como pagas.':'Paciente e mensalidade cadastrados!');
  }catch(e){hL();console.error(e);sT('Erro ao salvar: '+(e.message||e),'error')}
}

function editGerarParcelas(manterEstado){
  var valor=parseFloat((el('mensVal')||{}).value||0);
  var dia=parseInt((el('mensDia')||{}).value||0);
  var qtd=parseInt((el('mensQtd')||{}).value||0);
  var ini=(el('mensIni')||{}).value||'';
  var bloco=el('edit_parcelas_bloco');
  if(!qtd||qtd<1||!dia||dia<1||dia>28||!valor||valor<=0||!ini){if(bloco)bloco.style.display='none';return;}
  var dtIni=new Date(ini+'T00:00:00');
  var hoje=new Date();hoje.setHours(0,0,0,0);
  var novas=[];
  for(var i=0;i<qtd;i++){
    var ano=dtIni.getFullYear();
    var mes=dtIni.getMonth()+1+i;
    ano+=Math.floor(mes/12);mes=mes%12;
    var vd=new Date(ano,mes,dia);vd.setHours(0,0,0,0);
    var ds=vd.getFullYear()+'-'+String(vd.getMonth()+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
    var prev=editParcelaState[i];
    var pago=manterEstado&&prev?prev.pago:vd<hoje;
    var valorP=manterEstado&&prev?prev.valor:valor;
    novas.push({ref:ds,valor:valorP,pago:pago,retroativa:vd<hoje});
  }
  editParcelaState=novas;
  renderEditParcelaLista();
}

function renderEditParcelaLista(){
  var bloco=el('edit_parcelas_bloco');var lista=el('edit_parcelas_lista');
  if(!bloco||!lista)return;
  if(!editParcelaState.length){bloco.style.display='none';return;}
  bloco.style.display='block';lista.innerHTML='';
  editParcelaState.forEach(function(p,i){
    var dtObj=new Date(p.ref+'T12:00:00');
    var mesNome=dtObj.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    var div=document.createElement('div');
    div.className='parcela-row'+(p.pago?' pago':'');
    div.innerHTML=
      '<div class="parc-num'+(p.pago?' pago':'')+'">'+( i+1)+'</div>'+
      '<div class="parc-info"><div class="parc-mes">'+mesNome+'</div>'+
      '<div class="parc-venc">Vence: '+fmtD(p.ref)+(p.retroativa&&!p.pago?' <span style="color:#DC2626;font-weight:700">(atrasado)</span>':'')+'</div></div>'+
      '<div class="parc-val-wrap"><span class="parc-val-prefix">R$</span>'+
      '<input type="number" class="parc-val-input'+(p.pago?' pago-input':'')+'" id="epv_'+i+'" step="0.01" value="'+p.valor.toFixed(2)+'" '+(p.pago?'readonly':'')+' onchange="editUpdateValor('+i+',this.value)"></div>'+
      '<button class="btn-pago'+(p.pago?' marcado':'')+'" onclick="editTogglePago('+i+')">'+
      (p.pago?'<i class="fas fa-check-circle"></i> JA PAGO':'<i class="far fa-circle"></i> Marcar como Pago')+'</button>';
    lista.appendChild(div);
  });
}

function editUpdateValor(i,v){if(editParcelaState[i])editParcelaState[i].valor=parseFloat(v)||0;}
function editTogglePago(i){if(!editParcelaState[i])return;editParcelaState[i].pago=!editParcelaState[i].pago;renderEditParcelaLista();}

async function saveMensEdit(){

  var telPac=(el('mensTelPac').value||'').trim();

  if(!qtd||qtd<1){sT('Informe o total de meses','error');return}

  var dtIni=new Date(ini+'T00:00:00');
  var dv=dtIni.getFullYear()+'-'+String(dtIni.getMonth()+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
  var hj=new Date();hj.setHours(0,0,0,0);
  var st=new Date(dv+'T00:00:00')<hj?'atrasado':'pendente';
  try{
    sL('Salvando...');
    if(pacId){var pacUpd={nome:nomePac};if(telPac)pacUpd.telefone=telPac;await sb.from('clientes').update(pacUpd).eq('id',pacId);}
    await sb.from('mensalidades').update({valor:valor,data_inicio:ini,dia_vencimento:dia,data_vencimento:dv,observacoes:obs,status:st}).eq('id',id);
    // Sincroniza pagamentos: remove todos e recria os marcados como pagos
    await sb.from('pagamentos_mensalidade').delete().eq('mensalidade_id',id).eq('salao_id',salaoId);
    var pagas=editParcelaState.filter(function(p){return p.pago});
    if(pagas.length){
      var hoje2=new Date().toISOString().split('T')[0];
      var inserts=pagas.map(function(p){return{mensalidade_id:id,valor_pago:p.valor,forma_pagamento:'dinheiro',data_pagamento:hoje2,comprovante:p.ref.substring(0,7),salao_id:salaoId}});
      await sb.from('pagamentos_mensalidade').insert(inserts);
    }
    closeModal();await loadAll();sT('Contrato atualizado com sucesso!');
  }catch(e){hL();sT('Erro ao salvar','error');console.error(e)}
}

}

    '<div class="modal-header"><h2><i class="fas fa-layer-group" style="color:var(--primary)"></i> '+(p?'Editar Plano':'Novo Plano')+'</h2><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>'+
    '<div class="modal-body"><input type="hidden" id="planoId" value="'+(p?p.id:'')+'"><div class="form-grid">'+

    '<div class="form-group"><label class="form-label req">Valor por Mes (R$)</label><input type="number" class="form-input" id="planoValor" step="0.01" value="'+(p?p.valor:'')+'" placeholder="Ex: 500.00"></div>'+
    '<div class="form-group full"><label class="form-label">Descricao (opcional)</label><textarea class="form-textarea" id="planoDesc" rows="2" placeholder="Informacoes adicionais...">'+(p&&p.descricao?p.descricao:'')+'</textarea></div>'+

async function savePlano(){
  var id=el('planoId').value,nome=el('planoNome').value.trim(),tipo=el('planoTipo').value,valor=parseFloat(el('planoValor').value),desc=el('planoDesc').value.trim();
  if(!nome||!valor){sT('Informe nome e valor','error');return}
  try{
    sL('Salvando plano...');
    if(id)await sb.from('planos').update({nome:nome,tipo:tipo,valor:valor,descricao:desc}).eq('id',id);
    else await sb.from('planos').insert({nome:nome,tipo:tipo,valor:valor,descricao:desc,salao_id:salaoId,ativo:true});
    closeModal();await loadAll();sT(id?'Plano atualizado!':'Plano criado!');
  }catch(e){hL();sT('Erro ao salvar plano','error')}
}

async function togglePlano(id){
  var p=planos.find(function(x){return x.id===id});
  if(!p||!confirm((p.ativo!==false?'Desativar':'Reativar')+' "'+p.nome+'"?'))return;
  await sb.from('planos').update({ativo:p.ativo===false}).eq('id',id);closeModal();await loadAll();sT('Plano atualizado!');
}

  openModal(

async function inativarPaciente(pacienteId, mensalidadeId, nomePaciente){
  if(!confirm('Inativar '+nomePaciente+'?\n\nO paciente sera marcado como INATIVO e todas as mensalidades em aberto serao canceladas (nao vai cobrar mais nada).\n\nOs pagamentos ja realizados sao mantidos no historico.\nPode ser reativado depois se necessario.'))return;
  try{
    sL('Inativando paciente...');
    // 1. Inativar o paciente
    var r1=await sb.from('clientes').update({ativo:false,status:'inativo'}).eq('id',pacienteId).eq('salao_id',salaoId);
    if(r1.error)throw r1.error;
    // 2. Cancelar TODAS as mensalidades ativas deste paciente (para de cobrar)
    var r2=await sb.from('mensalidades').update({status:'cancelado'}).eq('paciente_id',pacienteId).eq('salao_id',salaoId).neq('status','cancelado');
    if(r2.error)throw r2.error;
    closeModal();await loadAll();sT(nomePaciente+' inativado. Mensalidades canceladas, historico mantido.');
  }catch(e){hL();sT('Erro ao inativar','error');console.error(e)}
}

async function excluirPacienteCompleto(pacienteId, mensalidadeId, nomePaciente){
  if(!confirm('EXCLUIR '+nomePaciente+' da base de dados?\n\nIsso vai apagar:\n- O cadastro do paciente\n- Todas as mensalidades e pagamentos\n- Todos os agendamentos\n\nEssa acao NAO pode ser desfeita!'))return;
  if(!confirm('Ultima confirmacao: excluir TUDO de '+nomePaciente+'?'))return;
  try{
    sL('Excluindo paciente...');
    // 1. Busca todas as mensalidades deste paciente
    var rMens=await sb.from('mensalidades').select('id').eq('paciente_id',pacienteId).eq('salao_id',salaoId);
    if(rMens.error)throw rMens.error;
    var mensIds=(rMens.data||[]).map(function(m){return m.id});
    // 2. Exclui pagamentos vinculados às mensalidades
    for(var i=0;i<mensIds.length;i++){
      await sb.from('pagamentos_mensalidade').delete().eq('mensalidade_id',mensIds[i]).eq('salao_id',salaoId);
    }
    // 3. Exclui mensalidades
    if(mensIds.length){
      await sb.from('mensalidades').delete().eq('paciente_id',pacienteId).eq('salao_id',salaoId);
    }
    // 4. Exclui agendamentos (foreign key que bloqueava)
    await sb.from('agendamentos').delete().eq('cliente_id',pacienteId);
    // 5. Tenta excluir outras tabelas que possam referenciar o cliente
    try{await sb.from('servicos_realizados').delete().eq('cliente_id',pacienteId)}catch(e){}
    try{await sb.from('vendas').delete().eq('cliente_id',pacienteId)}catch(e){}
    // 6. Exclui o paciente
    var res=await sb.from('clientes').delete().eq('id',pacienteId).eq('salao_id',salaoId);
    if(res.error)throw res.error;
    closeModal();await loadAll();sT(nomePaciente+' foi removido completamente.');
  }catch(e){
    hL();console.error(e);
    // Se ainda tiver FK, oferece só inativar
    if(e.code==='23503'){
      sT('Nao foi possivel excluir pois existem outros registros vinculados. O paciente foi inativado no lugar.','warning');
      await sb.from('clientes').update({ativo:false,status:'inativo'}).eq('id',pacienteId).eq('salao_id',salaoId);
      await sb.from('mensalidades').update({status:'cancelado'}).eq('paciente_id',pacienteId).eq('salao_id',salaoId).neq('status','cancelado');
      closeModal();await loadAll();
    }else{
      sT('Erro ao excluir: '+(e.message||e),'error');
    }
  }
}

async function excluirMensalidade(mensalidadeId,nomePaciente){
  if(!confirm('EXCLUIR mensalidade de '+nomePaciente+'?\n\nApaga TUDO. Nao pode desfazer!'))return;
  if(!confirm('Confirmar exclusao total de '+nomePaciente+'?'))return;
  try{sL('Excluindo...');await sb.from('pagamentos_mensalidade').delete().eq('mensalidade_id',mensalidadeId).eq('salao_id',salaoId);var res=await sb.from('mensalidades').delete().eq('id',mensalidadeId).eq('salao_id',salaoId);if(res.error)throw res.error;closeModal();await loadAll();sT('Mensalidade excluida!')}
  catch(e){hL();sT('Erro ao excluir','error')}
}

// ==============================
// RECIBO / WHATSAPP
// ==============================
function gerarRecibo(parcId){
  var parc=parcelas.find(function(x){return x.id===parcId});if(!parc)return;
  var pag=parc.pagamento;
  var txt='RECIBO DE PAGAMENTO\n\nPaciente: '+(parc.clientes?parc.clientes.nome:'-')+'\nPlano: '+(parc.planos?parc.planos.nome:'-')+'\nReferencia: '+parc.data_vencimento.substring(0,7)+'\nVencimento: '+fmtD(parc.data_vencimento)+'\nValor: '+fmt(pag?pag.valor_pago:parc.valor)+'\nForma: '+(pag?fmtF(pag.forma_pagamento):'-')+'\nData Pgto: '+(pag?fmtD(pag.data_pagamento):'-')+'\n\nGerado em '+new Date().toLocaleString('pt-BR');
  var w=window.open('about:blank','_blank');if(w){w.document.title='Recibo';w.document.body.innerText=txt;w.print()}else alert(txt);
}

function enviarCobranca(parcId){
  var parc=parcelas.find(function(x){return x.id===parcId});
  if(!parc||!parc.clientes||!parc.clientes.telefone){sT('Paciente sem telefone cadastrado','error');return}
  var tel=parc.clientes.telefone.replace(/\D/g,'');if(!tel.startsWith('55'))tel='55'+tel;
  var dias=diasAtraso(parc.data_vencimento);
  var msg=dias>0?'Ola, '+parc.clientes.nome+'! Sua mensalidade de '+fmt(parc.valor)+' esta com '+dias+' dia(s) de atraso (venceu em '+fmtD(parc.data_vencimento)+'). Por favor regularize. Obrigado!':'Ola, '+parc.clientes.nome+'! Sua mensalidade de '+fmt(parc.valor)+' vence hoje ('+fmtD(parc.data_vencimento)+'). Qualquer duvida estamos a disposicao!';
  window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msg),'_blank');
}

function dispararAlertas(){
  var pend=parcelas.filter(function(p){return p._st==='atrasado'||p._st==='vence_hoje'});
  if(!pend.length){sT('Nenhum alerta pendente','warning');return}
  if(!confirm('Enviar cobranca pelo WhatsApp para '+pend.length+' pacientes?'))return;
  pend.forEach(function(p,i){setTimeout(function(){enviarCobranca(p.id)},i*1500)});
  sT('Abrindo alertas para '+pend.length+' pacientes...');
}

async function reativarPaciente(pacienteId, mensalidadeId, nomePaciente){
  if(!confirm('Reativar '+nomePaciente+'?\n\nO paciente voltara ao status ATIVO e a mensalidade sera reaberta.'))return;
  try{
    sL('Reativando paciente...');
    var r1=await sb.from('clientes').update({ativo:true,status:'ativo'}).eq('id',pacienteId).eq('salao_id',salaoId);
    if(r1.error)throw r1.error;
    var r2=await sb.from('mensalidades').update({status:'pendente'}).eq('id',mensalidadeId).eq('salao_id',salaoId);
    if(r2.error)throw r2.error;
    await loadAll();sT(nomePaciente+' reativado com sucesso!');
  }catch(e){hL();sT('Erro ao reativar','error');console.error(e)}
}

async function excluirPagamentoParcela(parc){
  if(!parc.pagamento||!parc.pagamento.id){sT('Nenhum pagamento encontrado para esta parcela','error');return}
  var nomePac=parc.clientes?parc.clientes.nome:'-';
  var ref=parc.data_vencimento.substring(0,7);
  if(!confirm('Desfazer pagamento de '+nomePac+' referente a '+ref+'?\n\nA parcela voltara ao status "Em Atraso" ou "Futuro".'))return;
  try{
    sL('Removendo pagamento...');
    var res=await sb.from('pagamentos_mensalidade').delete().eq('id',parc.pagamento.id).eq('salao_id',salaoId);
    if(res.error)throw res.error;
    await loadAll();sT('Pagamento desfeito. Parcela voltou ao status anterior.');
  }catch(e){hL();sT('Erro ao remover pagamento','error');console.error(e)}
}

async function excluirPagamentoById(pagId){
  if(!confirm('Excluir este pagamento do historico?\n\nA parcela correspondente voltara ao status anterior.'))return;
  try{
    sL('Excluindo pagamento...');
    var res=await sb.from('pagamentos_mensalidade').delete().eq('id',pagId).eq('salao_id',salaoId);
    if(res.error)throw res.error;
    await loadAll();sT('Pagamento excluido do historico.');
  }catch(e){hL();sT('Erro ao excluir pagamento','error');console.error(e)}
}
