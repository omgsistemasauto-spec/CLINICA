<script>

var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkZmNvc3h5ZXFnYmpkZWRhcmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MDkxNTQsImV4cCI6MjA3NzA4NTE1NH0.wNx6jQAi9nn2K_E-40VuV6k0sWPoF5bWAw_si__aSyo';

var planos=[],mensalidades=[],pagamentos=[],pacientes=[],servicos=[],profissionais=[],sessoes=[],parcelas=[];
var inadFilter='todos',currentTab='inadimplencia';

function $(id){return document.getElementById(id)}
function showLoading(t){$('loadingText').textContent=t||'Carregando...';$('loadingOverlay').style.display='flex'}
function hideLoading(){$('loadingOverlay').style.display='none'}
function showToast(m,t){var el=$('toast');el.className='toast '+(t||'success')+' show';el.innerHTML='<i class="fas fa-'+(t==='error'?'times-circle':t==='warning'?'exclamation-circle':'check-circle')+'"></i> '+m;setTimeout(function(){el.classList.remove('show')},3500)}
function fmt(v){return'R$ '+(Number(v)||0).toFixed(2).replace('.',',')}
function fmtDate(d){if(!d)return'-';var dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR')}
function fmtForma(f){return{pix:'PIX',cartao_credito:'Cartão Crédito',cartao_debito:'Cartão Débito',dinheiro:'Dinheiro',boleto:'Boleto'}[f]||f}
function fmtTipo(t){return{mensal:'Mensal',trimestral:'Trimestral',semestral:'Semestral',anual:'Anual'}[t]||t}

function getStatus(m){
    if(m.status==='cancelado')return'cancelado';
    if(m.status==='pago')return'pago';
    var hoje=new Date();hoje.setHours(0,0,0,0);
    var venc=new Date(m.data_vencimento+'T00:00:00');venc.setHours(0,0,0,0);
    if(venc.getTime()===hoje.getTime())return'vence_hoje';
    if(venc<hoje)return'atrasado';
    return'futuro';
}

function getMesesDoPlano(tipo){
    if(tipo==='trimestral')return 3;
    if(tipo==='semestral')return 6;
    if(tipo==='anual')return 12;
    return 1;
}

function calcularParcelas(){
    var hoje=new Date();hoje.setHours(0,0,0,0);
    parcelas=[];
    var ativas=mensalidades.filter(function(m){return m.status!=='cancelado'});
    ativas.forEach(function(m){
        var plano=planos.find(function(p){return p.id===m.plano_id});
        if(!plano)return;
        var mesesPlano=getMesesDoPlano(plano.tipo);
        var diaVenc=m.dia_vencimento;
        var inicio=m.data_inicio||m.data_vencimento;
        var dtInicio=new Date(inicio+'T00:00:00');
        var mesI=dtInicio.getMonth();
        var anoI=dtInicio.getFullYear();
        var cursor=new Date(anoI,mesI,diaVenc);
        if(cursor<dtInicio){cursor.setMonth(cursor.getMonth()+mesesPlano)}
        var proximoFuturo=false;
        while(true){
            var vencDate=new Date(cursor.getFullYear(),cursor.getMonth(),diaVenc);
            vencDate.setHours(0,0,0,0);
            if(vencDate>hoje&&proximoFuturo)break;
            var ds=vencDate.getFullYear()+'-'+String(vencDate.getMonth()+1).padStart(2,'0')+'-'+String(diaVenc).padStart(2,'0');
            var dsRef=ds.substring(0,7);
            var pag=pagamentos.find(function(p){
                if(p.mensalidade_id!==m.id)return false;
                if(p.comprovante&&p.comprovante.indexOf(ds)===0)return true;
                if(p.comprovante&&p.comprovante.substring(0,7)===dsRef)return true;
                if(p.data_pagamento&&p.data_pagamento.substring(0,7)===dsRef)return true;
                return false;
            });
            var status;
            if(pag){status='pago'}
            else if(vencDate.getTime()===hoje.getTime()){status='vence_hoje'}
            else if(vencDate<hoje){status='atrasado'}
            else{status='futuro';proximoFuturo=true}
            parcelas.push({
                id:m.id+'_'+ds,
                mensalidade_id:m.id,
                paciente_id:m.paciente_id,
                plano_id:m.plano_id,
                clientes:m.clientes,
                planos:m.planos,
                valor:m.valor,
                data_vencimento:ds,
                dia_vencimento:diaVenc,
                _st:status,
                pagamento:pag||null
            });
            if(vencDate>hoje)break;
            cursor.setMonth(cursor.getMonth()+mesesPlano);
        }
    });
    parcelas.sort(function(a,b){return a.data_vencimento>b.data_vencimento?1:-1});
}
function diasAtraso(d){var h=new Date();h.setHours(0,0,0,0);return Math.floor((h-new Date(d+'T00:00:00'))/864e5)}
function badgeHTML(s){var map={pago:'<span class="badge badge-pago"><i class="fas fa-circle"></i> Em Dia</span>',atrasado:'<span class="badge badge-atrasado"><i class="fas fa-circle"></i> Atrasado</span>',vence_hoje:'<span class="badge badge-vence-hoje"><i class="fas fa-circle"></i> Vence Hoje</span>',futuro:'<span class="badge" style="background:#EDE9FE;color:#7C3AED"><i class="fas fa-circle"></i> Futuro</span>',cancelado:'<span class="badge badge-cancelado"><i class="fas fa-circle"></i> Cancelado</span>'};return map[s]||s}

async function init(){

async function loadAll(){
    showLoading('Carregando dados...');
    try{
        var r=await Promise.all([
            sb.from('planos').select('*').eq('salao_id',salaoId).order('nome'),
            sb.from('mensalidades').select('*,clientes(id,nome,telefone),planos(id,nome,tipo,valor,qtd_sessoes)').eq('salao_id',salaoId).order('data_vencimento'),
            sb.from('pagamentos_mensalidade').select('*,mensalidades(*,clientes(id,nome,telefone),planos(id,nome))').eq('salao_id',salaoId).order('data_pagamento',{ascending:false}),
            sb.from('clientes').select('id,nome,telefone').eq('salao_id',salaoId).eq('ativo',true).order('nome'),
            sb.from('servicos').select('id,nome,preco,comissao').eq('salao_id',salaoId).eq('ativo',true).order('nome'),
            sb.from('profissionais').select('id,nome').eq('salao_id',salaoId).eq('ativo',true).order('nome'),
            sb.from('sessoes').select('*,clientes(id,nome),servicos(id,nome),profissionais(id,nome),planos(id,nome,qtd_sessoes)').eq('salao_id',salaoId).order('data_sessao',{ascending:false})
        ]);
        planos=r[0].data||[];mensalidades=r[1].data||[];pagamentos=r[2].data||[];pacientes=r[3].data||[];servicos=r[4].data||[];profissionais=r[5].data||[];sessoes=r[6].data||[];

}

function toggleDetail(id){
    var row=document.getElementById(id);
    if(!row)return;
    var isOpen=row.style.display!=='none';
    row.style.display=isOpen?'none':'table-row';
    var prev=row.previousElementSibling;
    if(prev){
        var icon=prev.querySelector('.fa-chevron-down,.fa-chevron-up');
        if(icon){icon.className=isOpen?'fas fa-chevron-down':'fas fa-chevron-up'}
    }
}

function renderSessoes(){
    var hoje=new Date();
    var mesAtual=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
    if(!window._sessFiltroMes)window._sessFiltroMes='atual';
    var fm=window._sessFiltroMes;
    var h='<div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">';
    h+='<button class="btn btn-sm '+(fm==='atual'?'btn-primary':'btn-secondary')+'" onclick="window._sessFiltroMes=\'atual\';renderSessoes()"><i class="fas fa-calendar-day"></i> Mes Atual</button>';
    h+='<button class="btn btn-sm '+(fm==='anteriores'?'btn-primary':'btn-secondary')+'" onclick="window._sessFiltroMes=\'anteriores\';renderSessoes()"><i class="fas fa-calendar-alt"></i> Meses Anteriores</button>';
    h+='<button class="btn btn-sm '+(fm==='todos'?'btn-primary':'btn-secondary')+'" onclick="window._sessFiltroMes=\'todos\';renderSessoes()"><i class="fas fa-calendar"></i> Todos</button>';
    h+='<div style="flex:1"></div><button class="btn btn-primary btn-sm" onclick="openSessaoModal()"><i class="fas fa-plus"></i> Registrar Sessao</button></div>';
    var filtradas=sessoes;
    if(fm==='atual')filtradas=sessoes.filter(function(s){return s.data_sessao&&s.data_sessao.substring(0,7)===mesAtual});
    else if(fm==='anteriores')filtradas=sessoes.filter(function(s){return s.data_sessao&&s.data_sessao.substring(0,7)<mesAtual});
    var porPac={};
    filtradas.forEach(function(s){
        var pid=s.paciente_id;
        if(!porPac[pid])porPac[pid]={nome:s.clientes?s.clientes.nome:'?',telefone:s.clientes?s.clientes.telefone||'':'',sessoes:[],totalServicos:0};
        porPac[pid].sessoes.push(s);
        porPac[pid].totalServicos++;
    });
    var lista=Object.keys(porPac).map(function(pid){return{pid:pid,data:porPac[pid]}});
    lista.sort(function(a,b){return a.data.nome>b.data.nome?1:-1});
    h+='<div class="table-card"><div class="table-header"><div class="table-title"><i class="fas fa-clipboard-check" style="color:var(--cyan);margin-right:.4rem"></i>Servicos por Paciente</div><div class="table-count">'+lista.length+' pacientes</div></div>';
    h+='<div class="table-wrap"><table><thead><tr><th>Paciente</th><th>Sessoes Realizadas</th><th>Faltas</th><th>Plano</th><th>Progresso</th><th>Periodo</th><th></th></tr></thead><tbody>';
    if(!lista.length){h+='<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📋</div><h3>Nenhuma sessao encontrada</h3></div></td></tr>'}
    for(var i=0;i<lista.length;i++){
        var g=lista[i],d=g.data;
        var realizadas=d.sessoes.filter(function(s){return s.status==='realizada'}).length;
        var faltas=d.sessoes.filter(function(s){return s.status==='falta'}).length;

        h+='<td style="font-size:.78rem;color:var(--muted)">'+periodoTxt+'</td>';

        h+='<div style="font-weight:700;font-size:.82rem;margin-bottom:.5rem;color:var(--primary)"><i class="fas fa-list"></i> Detalhes - '+d.nome+'</div>';
        h+='<table style="width:100%;font-size:.8rem"><thead><tr style="background:#EFF6FF"><th>Data</th><th>Servico</th><th>Profissional</th><th>Status</th><th>Evolucao</th><th>Acoes</th></tr></thead><tbody>';
        var sorted=d.sessoes.sort(function(a,b){return a.data_sessao>b.data_sessao?-1:1});
        for(var j=0;j<sorted.length;j++){
            var s=sorted[j];

function gerarRelatorio(tipo){
    var h='';
    if(tipo==='receitas'){
        var porForma={};pagamentos.forEach(function(p){var f=fmtForma(p.forma_pagamento);porForma[f]=(porForma[f]||0)+(p.valor_pago||0)});
        var total=pagamentos.reduce(function(s,p){return s+(p.valor_pago||0)},0);
        h+='<div class="table-card"><div class="table-header"><div class="table-title">Receitas por Forma</div><button class="btn btn-secondary btn-sm" onclick="exportarCSV(\'receitas\')"><i class="fas fa-download"></i> CSV</button></div><div class="table-wrap"><table><thead><tr><th>Forma</th><th>Total</th><th>%</th><th>Qtd</th></tr></thead><tbody>';
        Object.keys(porForma).sort(function(a,b){return porForma[b]-porForma[a]}).forEach(function(f){h+='<tr><td style="font-weight:600">'+f+'</td><td style="font-weight:700;color:var(--green)">'+fmt(porForma[f])+'</td><td>'+(total?Math.round(porForma[f]/total*100):0)+'%</td><td>'+pagamentos.filter(function(p){return fmtForma(p.forma_pagamento)===f}).length+'</td></tr>'});
        h+='<tr style="background:#F0FDF4;font-weight:700"><td>TOTAL</td><td style="color:var(--green)">'+fmt(total)+'</td><td>100%</td><td>'+pagamentos.length+'</td></tr></tbody></table></div></div>';
    }else if(tipo==='servicos'){
        var ps={};
        sessoes.filter(function(s){return s.status==='realizada'}).forEach(function(s){
            var n=s.servicos?s.servicos.nome:'?';
            var sid=s.servico_id||'?';
            if(!ps[sid])ps[sid]={nome:n,qtd:0,receita:0};
            ps[sid].qtd++;
            var srv=servicos.find(function(x){return x.id===sid});
            if(srv)ps[sid].receita+=Number(srv.preco)||0;
        });
        var sorted=Object.values(ps).sort(function(a,b){return b.receita-a.receita});
        var totalS=sessoes.filter(function(s){return s.status==='realizada'}).length;
        var totalR=sorted.reduce(function(s,x){return s+x.receita},0);
        h+='<div class="table-card"><div class="table-header"><div class="table-title">Serviços — Ranking e Rentabilidade</div><button class="btn btn-secondary btn-sm" onclick="exportarCSV(\'servicos\')"><i class="fas fa-download"></i> CSV</button></div><div class="table-wrap"><table><thead><tr><th>#</th><th>Serviço</th><th>Sessões</th><th>% Sessões</th><th>Receita Gerada</th><th>% Receita</th><th>Ticket Médio</th></tr></thead><tbody>';
        for(var si=0;si<sorted.length;si++){
            var sv=sorted[si];
            var pctS=totalS?Math.round(sv.qtd/totalS*100):0;
            var pctR=totalR?Math.round(sv.receita/totalR*100):0;
            var ticket=sv.qtd?sv.receita/sv.qtd:0;
            h+='<tr><td style="font-weight:700;color:var(--purple)">'+(si+1)+'</td><td style="font-weight:600">'+sv.nome+'</td>';
            h+='<td>'+sv.qtd+'</td><td>'+pctS+'%</td>';
            h+='<td style="font-weight:700;color:var(--green)">'+fmt(sv.receita)+'</td><td>'+pctR+'%</td>';
            h+='<td>'+fmt(ticket)+'</td></tr>';
        }
        h+='<tr style="background:#F0FDF4;font-weight:700"><td></td><td>TOTAL</td><td>'+totalS+'</td><td>100%</td><td style="color:var(--green)">'+fmt(totalR)+'</td><td>100%</td><td>'+fmt(totalS?totalR/totalS:0)+'</td></tr>';
        h+='</tbody></table></div></div>';
    }else if(tipo==='inadimplencia'){
        var atr=parcelas.filter(function(m){return m._st==='atrasado'});
        var dev=atr.reduce(function(s,m){return s+(m.valor||0)},0);
        atr.sort(function(a,b){return diasAtraso(b.data_vencimento)-diasAtraso(a.data_vencimento)});
        h+='<div class="alert-box danger"><i class="fas fa-exclamation-triangle"></i> '+atr.length+' inadimplentes - Total: '+fmt(dev)+'</div>';
        h+='<div class="table-card"><div class="table-header"><div class="table-title">Inadimplência</div><button class="btn btn-secondary btn-sm" onclick="exportarCSV(\'inadimplencia\')"><i class="fas fa-download"></i> CSV</button></div><div class="table-wrap"><table><thead><tr><th>Paciente</th><th>Plano</th><th>Vencimento</th><th>Valor</th><th>Dias</th></tr></thead><tbody>';
        atr.forEach(function(m){h+='<tr><td style="font-weight:600">'+(m.clientes?m.clientes.nome:'-')+'</td><td><span class="plano-tag">'+(m.planos?m.planos.nome:'-')+'</span></td><td>'+fmtDate(m.data_vencimento)+'</td><td style="font-weight:700;color:var(--red)">'+fmt(m.valor)+'</td><td style="color:var(--red);font-weight:700">'+diasAtraso(m.data_vencimento)+'d</td></tr>'});
        h+='</tbody></table></div></div>';
    }
    var rc=document.getElementById('relContent');
    if(rc)rc.innerHTML=h;
}

async function savePlano(){
    var id=$('planoId').value,nome=$('planoNome').value.trim(),tipo=$('planoTipo').value,valor=parseFloat($('planoValor').value);
    var sess=parseInt($('planoSessoes').value)||null,val=parseInt($('planoValidade').value)||null,desc=$('planoDesc').value.trim();

    var data={nome:nome,tipo:tipo,valor:valor,qtd_sessoes:sess,validade_dias:val,descricao:desc,servicos_inclusos:si,salao_id:salaoId,ativo:true};
    try{showLoading('Salvando...');if(id)await sb.from('planos').update(data).eq('id',id);else await sb.from('planos').insert(data);closeModal();await loadAll();showToast(id?'Atualizado!':'Plano criado!')}catch(e){hideLoading();showToast('Erro','error')}

async function saveMens(){
    var id=$('mensId').value,pid=$('mensPac').value,plid=$('mensPlan').value,valor=parseFloat($('mensVal').value),ini=$('mensIni').value,dia=parseInt($('mensDia').value),obs=$('mensObs').value.trim();
    if(!pid||!plid||!valor||!ini||!dia){showToast('Preencha todos','error');return}
    var dtIni=new Date(ini+'T00:00:00');
    var dv=dtIni.getFullYear()+'-'+String(dtIni.getMonth()+1).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
    var vencDate=new Date(dv+'T00:00:00');var hj=new Date();hj.setHours(0,0,0,0);
    var st=vencDate<hj?'atrasado':(vencDate.getTime()===hj.getTime()?'pendente':'pendente');
    var data={paciente_id:pid,plano_id:plid,valor:valor,data_inicio:ini,dia_vencimento:dia,data_vencimento:dv,observacoes:obs,salao_id:salaoId,status:st};
    try{showLoading('Salvando...');if(id)await sb.from('mensalidades').update(data).eq('id',id);else await sb.from('mensalidades').insert(data);closeModal();await loadAll();showToast(id?'Atualizado!':'Mensalidade criada!')}catch(e){hideLoading();showToast('Erro','error')}
}

async function registrarPag(){
    var mid=$('pagMid').value,val=parseFloat($('pagVal').value),forma=$('pagFor').value,data=$('pagDat').value,comp=$('pagComp').value,rec=$('pagRec').checked;

    try{showLoading('Registrando...');
        await sb.from('pagamentos_mensalidade').insert({mensalidade_id:mid,valor_pago:val,forma_pagamento:forma,data_pagamento:data,comprovante:compFinal,recibo_gerado:rec,salao_id:salaoId});

    var hist=sessoes.filter(function(x){return x.paciente_id===s.paciente_id&&x.servico_id===s.servico_id&&x.status==='realizada'}).sort(function(a,b){return a.data_sessao>b.data_sessao?1:-1});

// RECIBO - using string concat to avoid script tag issue
function gerarRecibo(mid){
    var m=parcelas.find(function(x){return x.id===mid})||mensalidades.find(function(x){return x.id===mid});
    var pag=pagamentos.find(function(p){return p.mensalidade_id===mid});
    if(!m)return;
    var nome=m.clientes?m.clientes.nome:'-';
    var plano=m.planos?m.planos.nome:'-';
    var venc=fmtDate(m.data_vencimento);
    var val=fmt(pag?pag.valor_pago:m.valor);
    var frm=pag?fmtForma(pag.forma_pagamento):'-';
    var dpg=pag?fmtDate(pag.data_pagamento):'-';
    var txt='RECIBO DE PAGAMENTO\n\n';
    txt+='Paciente: '+nome+'\n';
    txt+='Plano: '+plano+'\n';
    txt+='Referencia: '+venc+'\n';
    txt+='Valor: '+val+'\n';
    txt+='Forma: '+frm+'\n';
    txt+='Data Pgto: '+dpg+'\n\n';
    txt+='Gerado em '+new Date().toLocaleString('pt-BR');
    var w=window.open('about:blank','_blank');
    if(w){w.document.title='Recibo';w.document.body.innerText=txt;w.print()}
    else{alert(txt)}
}

// WHATSAPP
function enviarCobranca(mid){
    var m=parcelas.find(function(x){return x.id===mid})||mensalidades.find(function(x){return x.id===mid});
    if(!m||!m.clientes||!m.clientes.telefone){showToast('Sem telefone','error');return}
    var tel=m.clientes.telefone.replace(/\D/g,'');if(!tel.startsWith('55'))tel='55'+tel;
    var dias=diasAtraso(m.data_vencimento),msg;
    if(dias>0)msg='Olá '+m.clientes.nome+'! 😊\n\nSua mensalidade do plano *'+(m.planos?m.planos.nome:'')+' * no valor de *'+fmt(m.valor)+'* está com *'+dias+' dias de atraso* (vencimento: '+fmtDate(m.data_vencimento)+').\n\nPor favor, regularize seu pagamento.\nQualquer dúvida estamos à disposição! 🙏';
    else msg='Olá '+m.clientes.nome+'! 😊\n\nLembramos que sua mensalidade do plano *'+(m.planos?m.planos.nome:'')+' * no valor de *'+fmt(m.valor)+'* vence *hoje* ('+fmtDate(m.data_vencimento)+').\n\nRealize o pagamento para manter seu plano em dia! ✅';
    window.open('https://wa.me/'+tel+'?text='+encodeURIComponent(msg),'_blank');
}
function dispararAlertas(){
    var p=parcelas.filter(function(m){return m._st==='atrasado'||m._st==='vence_hoje'});
    if(!p.length){showToast('Nenhum alerta','warning');return}
    if(!confirm('Enviar alertas para '+p.length+' pacientes?'))return;
    p.forEach(function(m,i){setTimeout(function(){enviarCobranca(m.id)},i*1500)});
    showToast('Abrindo '+p.length+' alertas...');
}

// EXPORTAR
function exportarRelatorio(){if(confirm('Exportar CSV de inadimplência?'))exportarCSV('inadimplencia')}
function exportarCSV(tipo){
    var csv='',fn='';
    if(tipo==='inadimplencia'){
        csv='Paciente,Plano,Vencimento,Valor,Dias Atraso,Telefone\n';
        mensalidades.filter(function(m){return m._st==='atrasado'}).forEach(function(m){csv+='"'+(m.clientes?m.clientes.nome:'')+'" ,"'+(m.planos?m.planos.nome:'')+'","'+fmtDate(m.data_vencimento)+'","'+fmt(m.valor)+'","'+diasAtraso(m.data_vencimento)+'","'+(m.clientes?m.clientes.telefone:'')+'"\n'});
        fn='inadimplencia.csv';
    }else if(tipo==='receitas'){
        csv='Data,Paciente,Plano,Valor,Forma\n';
        pagamentos.forEach(function(p){csv+='"'+fmtDate(p.data_pagamento)+'","'+(p.mensalidades&&p.mensalidades.clientes?p.mensalidades.clientes.nome:'')+'","'+(p.mensalidades&&p.mensalidades.planos?p.mensalidades.planos.nome:'')+'","'+fmt(p.valor_pago)+'","'+fmtForma(p.forma_pagamento)+'"\n'});
        fn='receitas.csv';
    }else if(tipo==='servicos'){
        csv='Data,Paciente,Serviço,Profissional,Status\n';
        sessoes.forEach(function(s){csv+='"'+fmtDate(s.data_sessao)+'","'+(s.clientes?s.clientes.nome:'')+'","'+(s.servicos?s.servicos.nome:'')+'","'+(s.profissionais?s.profissionais.nome:'')+'","'+s.status+'"\n'});
        fn='servicos.csv';
    }
    var blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();
    showToast('Exportado!');
}

function toggleNovoPac(){var f=$('novoPacForm');if(f)f.style.display=f.style.display==='none'?'block':'none'}

async function salvarNovoPac(){
var nome=$('novoPacNome').value.trim();
var tel=$('novoPacTel').value.trim();
if(!nome||!tel){sT('Preencha nome e telefone','err');return}
try{
sL('Salvando paciente...');
var r=await sb.from('clientes').insert({salao_id:sid,nome:nome,telefone:tel,ativo:true}).select().single();
if(r.error)throw r.error;
pacientes.push(r.data);
var sel=$('mensPac');
if(sel){
var opt=document.createElement('option');opt.value=r.data.id;opt.textContent=r.data.nome;opt.selected=true;
sel.appendChild(opt);
}
toggleNovoPac();
$('novoPacNome').value='';$('novoPacTel').value='';
hL();sT('Paciente cadastrado!');
}catch(e){console.error(e);hL();sT('Erro ao cadastrar','err')}
}

async function handleLogout(){await sb.auth.signOut();window.location.href='login.html'}
